<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Athletes | Wildcats Performance</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script src="js/header.js"></script>
<script src="js/athlete.js"></script>

<!-- ===== MAIN ===== -->
<main>

 <!-- TITLE -->
<section class="section" style="text-align:center;">
  <h1>👥 Athletes</h1>
</section>

<!-- A-Z FILTER -->
<section class="section" style="text-align:center;">
  <div id="alphabetBar" class="alphabet-bar"></div>
</section>

<!-- SEARCH -->
<section class="section">
  <input 
    type="text" 
    id="search" 
    class="search"
    placeholder="Search athletes..."
    onkeyup="filterAthletes()"
  >
</section>

<!-- GRID -->
<section class="section">
  <div id="athleteGrid" class="grid grid-auto"></div>
</section>

</main>

<!-- ===== SCRIPT ===== -->
<script>

let athletes = [];

/* ---------- HELPERS ---------- */

function clean(val) {
  if (!val || val === "NaN") return "-";
  return val;
}

function getTag(score) {
  score = Number(score);
  if (score >= 850) return ["elite", "🔥 Elite"];
  if (score >= 700) return ["strong", "💪 Strong"];
  if (score >= 550) return ["developing", "⚡ Developing"];
  return ["needs", "📈 Needs Work"];
}

/* ---------- LOAD DATA ---------- */

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

Papa.parse(CSV_URL + "&t=" + Date.now(), {
  download: true,
  header: false,
  skipEmptyLines: true,
  complete: function(results) {

    const data = results.data;
    const map = {};

    data.slice(1).forEach(row => {

      const name = row[0];
      const score = Number(row[row.length - 1]);

      if (!name) return;

      if (!map[name] || score > map[name]) {
        map[name] = score;
      }
    });

    athletes = Object.keys(map).map(name => ({
      name: name.replace(/"/g, "").trim(),
      score: map[name]
    }));

    athletes.sort((a, b) => b.score - a.score);

    render(athletes);
  }
});

/* ---------- RENDER ---------- */

function render(list) {
  const grid = document.getElementById("athleteGrid");
  grid.innerHTML = "";

  list.forEach(a => {
    const [tagClass, tagText] = getTag(a.score);

    

    grid.innerHTML += `
      <div class="card ${tagClass}" onclick="goToAthlete('${a.name}')">

        <div class="card-header">
          

          <div>
            <h3>${clean(a.name)}</h3>
            <p class="score">Score: ${clean(a.score)}</p>
          </div>
        </div>

        <div class="card-footer">
          <div class="tag ${tagClass}">
            ${tagText}
          </div>
        </div>

      </div>
    `;
  });
}

/* ---------- SEARCH ---------- */

function filterAthletes() {
  const term = document.getElementById("search").value.toLowerCase();

  const filtered = athletes.filter(a =>
    a.name.toLowerCase().includes(term)
  );

  render(filtered);
}

/* ---------- NAV ---------- */

function goToAthlete(name) {
  const encoded = encodeURIComponent(name);
  window.location.href = `history.html?name=${encoded}`;
}

</script>

</body>
</html>
