<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ SAFE FALLBACK FAVICON -->
<link id="dynamicFavicon" rel="icon" type="image/png" href="images/default-logo.png">

<title>Athletes | Performance System</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

  <!-- TITLE -->
  <section class="section center">
    <h1 class="page-title">👥 Athletes</h1>
  </section>

  <!-- A-Z FILTER -->
  <section class="section">
    <div id="alphabetBar" class="alphabet-bar"></div>
  </section>

  <!-- SEARCH -->
  <section class="section">
    <input 
      type="text" 
      id="search" 
      class="search"
      placeholder="Search athletes..."
      oninput="filterAthletes()"
      autocomplete="off"
    >
  </section>

  <!-- GRID -->
  <section class="section">
    <div id="athleteGrid" class="grid grid-auto"></div>
  </section>

</main>

<!-- ===== SCRIPTS (LOCKED ORDER) ===== -->

<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/athletes.js?v=1"></script>

</body>
</html>
