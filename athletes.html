<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Athletes | Wildcats Performance</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1>👥 Athletes</h1>
  </section>

  <!-- SEARCH -->
  <section class="section">
    <input 
      type="text" 
      id="search" 
      class="search"
      placeholder="Search athletes..."
      onkeyup="filterAthletes()"
    >
  </section>

  <!-- GRID -->
  <section class="section">

    <div id="athleteGrid" class="grid grid-auto"></div>

  </section>

</main>

<!-- ===== SCRIPT ===== -->
<script>

let athletes = [];

/* ---------- HELPERS ---------- */

function clean(val) {
  if (!val || val === "NaN") return "-";
  return val;
}

function getTag(score) {
  score = Number(score);
  if (score >= 900) return ["elite", "🔥 Elite"];
  if (score >= 800) return ["strong", "💪 Strong"];
  if (score >= 700) return ["developing", "⚡ Developing"];
  return ["needs", "📈 Needs Work"];
}

/* ---------- LOAD DATA ---------- */

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

fetch(csvUrl + "&t=" + Date.now())
  .then(res => res.text())
  .then(text => {
    console.log("CSV:", text); // debug

    const rows = text.split("\n").slice(1);
    const map = {};

    rows.forEach(r => {
      const cols = r.split(",");
      const name = cols[0];
      const score = Number(cols[1]);

      if (!name) return;

      if (!map[name] || score > map[name]) {
        map[name] = score;
      }
    });

    athletes = Object.keys(map).map(name => ({
      name,
      score: map[name]
    }));

    athletes.sort((a, b) => b.score - a.score);

    render(athletes);
  });

/* ---------- RENDER ---------- */

function render(list) {
  const grid = document.getElementById("athleteGrid");
  grid.innerHTML = "";

  list.forEach(a => {
    const [tagClass, tagText] = getTag(a.score);

    grid.innerHTML += `
      <div class="card" onclick="goToAthlete('${a.name}')">

        <h3>${clean(a.name)}</h3>

        <p style="color: var(--muted); margin-top:6px;">
          Score: ${clean(a.score)}
        </p>

        <div class="tag ${tagClass}">
          ${tagText}
        </div>

      </div>
    `;
  });
}

/* ---------- SEARCH ---------- */

function filterAthletes() {
  const term = document.getElementById("search").value.toLowerCase();

  const filtered = athletes.filter(a =>
    a.name.toLowerCase().includes(term)
  );

  render(filtered);
}

/* ---------- NAV ---------- */

function goToAthlete(name) {
  const encoded = encodeURIComponent(name);
  window.location.href = `history.html?name=${encoded}`;
}

</script>

</body>
</html>
