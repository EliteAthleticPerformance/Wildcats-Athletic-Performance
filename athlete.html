<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 INSTANT THEME + LOGO (NO FLICKER) -->

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";

  sessionStorage.setItem("school", school);

  const root = document.documentElement;

  // 🎨 THEME
  const theme = JSON.parse(sessionStorage.getItem("theme-" + school));
  if (theme) {
    root.style.setProperty("--primary", theme.primary);
    root.style.setProperty("--primaryLight", theme.primaryLight);
    root.style.setProperty("--primaryDark", theme.primaryDark);
    root.style.setProperty("--secondary", theme.secondary);
    root.style.setProperty("--secondaryLight", theme.secondaryLight);
    root.style.setProperty("--background", theme.background);
  }

  // 🖼️ LOGO (BULLETPROOF)
  const logo = sessionStorage.getItem("logo-" + school);

if (logo) {
  document.addEventListener("headerLoaded", () => {
    const el = document.getElementById("schoolLogo");

    if (!el) {
      console.warn("Logo element not found");
      return;
    }

    el.src = logo;

    el.onload = () => {
      el.classList.add("loaded");
    };
  });
}
})();
</script>

<title>Athlete Profile | Performance System</title>

<link rel="stylesheet" href="styles.css">

<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ===== HEADER ===== -->

<div id="header-placeholder"></div>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->

<main>

  <!-- TITLE -->

  <section class="section" style="text-align:center;">
    <h1 id="athleteName">Athlete</h1>
    <p id="rank" style="color: var(--muted);"></p>
    <p id="percentile" style="color: var(--muted);"></p>
  </section>

  <!-- ===== STATS ===== -->

  <section class="section">


<div class="athlete-stats">

  <div class="stat-box"><h3>Bench</h3><p id="bench">-</p></div>
  <div class="stat-box"><h3>Squat</h3><p id="squat">-</p></div>
  <div class="stat-box"><h3>Clean</h3><p id="clean">-</p></div>

  <div class="stat-box"><h3>Vertical</h3><p id="verticalScore">-</p></div>
  <div class="stat-box"><h3>Broad</h3><p id="broadScore">-</p></div>
  <div class="stat-box"><h3>Med Ball</h3><p id="medballScore">-</p></div>

  <div class="stat-box"><h3>Agility</h3><p id="proagility">-</p></div>
  <div class="stat-box"><h3>Sit Ups</h3><p id="situps">-</p></div>
  <div class="stat-box"><h3>10 Yard</h3><p id="tenyard">-</p></div>
  <div class="stat-box"><h3>40 Yard</h3><p id="forty">-</p></div>

</div>


  </section>

  <!-- ===== RADAR CHART ===== -->

  <section class="section">
    <div class="card" style="text-align:center;">
      <h2 style="margin-bottom:15px;">Performance Profile</h2>
      <canvas id="radarChart" height="250"></canvas>
    </div>
  </section>

  <!-- ===== PROGRESS CHART ===== -->

  <section class="section">
    <div class="card">
      <h2 style="text-align:center; margin-bottom:15px;">Progress Over Time</h2>
      <canvas id="progressChart" height="120"></canvas>
    </div>
  </section>

  <!-- ===== HISTORY TABLE ===== -->

  <section class="section">


<div class="card">

  <h2 style="text-align:center; margin-bottom:15px;">Testing History</h2>

  <div class="table-wrapper">

    <table id="historyTable" class="table">

      <thead>
        <tr>
          <th>Date</th>
          <th>Bench</th>
          <th>Squat</th>
          <th>Clean</th>
          <th>Strength Avg</th>
          <th>Vert</th>
          <th>Broad</th>
          <th>Med</th>
          <th>Agility</th>
          <th>Sit</th>
          <th>10yd</th>
          <th>40yd</th>
          <th>Performance</th>
        </tr>
      </thead>

      <tbody>
        <!-- JS FILLS -->
      </tbody>

    </table>

  </div>

</div>


  </section>

</main>

<!-- ===== SCRIPTS ===== -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="./js/themeLoader.js"></script>

<script src="js/dataLoader.js"></script>

<script src="js/athlete.js"></script>

</body>
</html>
