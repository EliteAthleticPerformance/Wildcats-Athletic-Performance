<!DOCTYPE html> 
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Athlete Profile | Performance System</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>

<!-- 🔥 LOAD ORDER FIXED -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1 id="athleteName">Athlete</h1>
    <p id="rank" style="color: var(--muted);"></p>
    <p id="percentile" style="color: var(--muted);"></p>
  </section>

  <!-- ===== STATS ===== -->
  <section class="section">
    <div class="athlete-stats">

      <div class="stat-box"><h3>Bench</h3><p id="bench">-</p></div>
      <div class="stat-box"><h3>Squat</h3><p id="squat">-</p></div>
      <div class="stat-box"><h3>Clean</h3><p id="clean">-</p></div>

      <div class="stat-box"><h3>Vertical</h3><p id="verticalScore">-</p></div>
      <div class="stat-box"><h3>Broad</h3><p id="broadScore">-</p></div>
      <div class="stat-box"><h3>Med Ball</h3><p id="medballScore">-</p></div>

      <div class="stat-box"><h3>Agility</h3><p id="proagility">-</p></div>
      <div class="stat-box"><h3>Sit-Ups</h3><p id="situps">-</p></div>
      <div class="stat-box"><h3>10 Yard</h3><p id="tenyard">-</p></div>
      <div class="stat-box"><h3>40 Yard</h3><p id="forty">-</p></div>

    </div>
  </section>

  <!-- ===== PERFORMANCE PROFILE ===== -->
  <section class="section">
    <div class="card chart-card" style="text-align:center;">
      
      <h2 style="margin-bottom:10px;">Performance Profile</h2>

      <div style="margin-bottom: 10px; font-size: 14px; color: #aaa;">
        Compare To:
      </div>

      <div id="comparisonButtons" class="comparison-buttons">
        <button data-type="none" class="active" onclick="setComparison('none')">None</button>
        <button data-type="top5" onclick="setComparison('top5')">Top 5</button>
        <button data-type="team" onclick="setComparison('team')">Team</button>
        <button data-type="weight" onclick="setComparison('weight')">Weight</button>
        <button data-type="grade" onclick="setComparison('grade')">Grade</button>
      </div>

      <div class="chart-wrapper">
        <canvas id="radarChart"></canvas>
      </div>

    </div>
  </section>

  <!-- ===== PROGRESS CHART ===== -->
  <section class="section">
    <div class="card chart-card">
      
      <h2 style="text-align:center; margin-bottom:10px;">
        Progress Over Time
      </h2>

      <!-- 🔥 TOGGLES (NOW INSIDE CARD) -->
      <div id="progressToggles" class="progress-toggles">
        <button data-key="strengthPoints" class="active">Strength</button>
        <button data-key="speedPoints" class="active">Speed</button>
        <button data-key="explosivePoints" class="active">Explosive</button>
        <button data-key="powerPoints" class="active">Power</button>
        <button data-key="score" class="active">Overall</button>
      </div>

      <div class="chart-wrapper">
        <canvas id="progressChart"></canvas>
      </div>

    </div>
  </section>

  <!-- ===== HISTORY TABLE ===== -->
  <section class="section">
    <div class="card">

      <h2 style="text-align:center; margin-bottom:15px;">
        Testing History
      </h2>

      <div class="table-wrapper">
        <table id="historyTable" class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Bench</th>
              <th>Squat</th>
              <th>Clean</th>
              <th>Strength Avg</th>
              <th>Vert</th>
              <th>Broad</th>
              <th>Med</th>
              <th>Agility</th>
              <th>Sit-Ups</th>
              <th>10yd</th>
              <th>40yd</th>
              <th>Performance</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>
  </section>

</main>

<!-- ===== DATA + PAGE LOGIC ===== -->

<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/athlete.js"></script>

</body>
</html>
