<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Enter Athlete Data</title>

<link rel="stylesheet" href="styles.css">

<!-- 🔒 COACH ACCESS -->
<script>
(function () {
  const PASSWORD = "Coach123"; // 🔥 CHANGE THIS

  let access = sessionStorage.getItem("coachAccess");

  if (access !== "true") {
    const pass = prompt("Enter coach password:");

    if (pass === PASSWORD) {
      sessionStorage.setItem("coachAccess", "true");
    } else {
      alert("Access denied");
      window.location.href = "index.html";
    }
  }
})();
</script>

</head>

<body>

<div id="header-placeholder"></div>
<script src="js/header.js"></script>

<main>

<section class="section" style="text-align:center;">
  <h1>🏋️ Enter Athlete Test</h1>
  <p style="color: var(--muted)">Record performance data</p>
</section>

<section class="section">

<div class="card">

<div id="formMessage" style="text-align:center; margin-bottom:10px;"></div>

<!-- ATHLETE INFO -->
<div class="form-section">
  <h2>ATHLETE INFO</h2>
  <div class="form-grid cols-4">
    <input id="name" placeholder="Last, First Name">
    <input id="date" type="date">

    <select id="hour">
      <option value="">Hour</option>
      <option>0</option><option>1</option><option>2</option>
      <option>3</option><option>4</option><option>5</option>
      <option>6</option><option>7</option><option>8</option><option>9</option>
    </select>

    <select id="grade">
      <option value="">Grade</option>
      <option>6</option><option>7</option><option>8</option>
      <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>

    <input id="weight" type="number" placeholder="Weight (lbs)">
  </div>
</div>

<!-- STRENGTH -->
<div class="form-section">
  <h2>STRENGTH</h2>
  <div class="form-grid cols-3">
    <input id="bench" type="number">
    <input id="squat" type="number">
    <select id="situps">
      <option value="">Sit Ups</option>
      <option>30</option><option>40</option>
      <option>50</option><option>60</option><option>70</option>
    </select>
  </div>
</div>

<!-- EXPLOSIVE -->
<div class="form-section">
  <h2>EXPLOSIVE</h2>
  <div class="form-grid cols-3">
    <select id="vertical">
      <option value="">Vertical</option>
      <option>20</option><option>22</option><option>24</option>
      <option>26</option><option>28</option><option>30</option>
      <option>32</option><option>34</option><option>36</option>
    </select>

    <select id="broad">
      <option value="">Broad</option>
      <option>6.00</option><option>7.00</option>
      <option>8.00</option><option>9.00</option><option>10.00</option>
    </select>

    <select id="agility">
      <option value="">Pro Agility</option>
      <option>4.2</option><option>4.4</option>
      <option>4.6</option><option>4.8</option><option>5.0</option>
    </select>
  </div>
</div>

<!-- POWER -->
<div class="form-section">
  <h2>POWER</h2>
  <div class="form-grid cols-2">
    <input id="clean" type="number">
    <select id="medball">
      <option value="">Med Ball Toss</option>
      <option>10</option><option>12</option><option>14</option>
      <option>16</option><option>18</option><option>20</option>
    </select>
  </div>
</div>

<!-- SPEED -->
<div class="form-section">
  <h2>SPEED</h2>
  <div class="form-grid cols-2">
    <select id="ten">
      <option value="">10 Yard</option>
      <option>1.2</option><option>1.4</option>
      <option>1.6</option><option>1.8</option><option>2.0</option>
    </select>

    <select id="forty">
      <option value="">40 Yard</option>
      <option>4.4</option><option>4.6</option>
      <option>4.8</option><option>5.0</option><option>5.2</option>
    </select>
  </div>
</div>

<div style="text-align:center; margin-top:20px;">
  <button class="save-btn" id="submitBtn">💾 Save Test</button>
</div>

</div>
</section>

</main>

<script src="js/themeLoader.js"></script>

<script>
async function waitForConfig() {
  let tries = 0;
  while (!window.SCHOOL_CONFIG && tries < 50) {
    await new Promise(r => setTimeout(r, 50));
    tries++;
  }
}

async function submitForm() {
  await waitForConfig();

  if (!SCHOOL_CONFIG.submitURL) {
    alert("No submit URL configured");
    return;
  }

  const payload = {
    name: name.value,
    date: date.value,
    hour: hour.value,
    grade: grade.value,
    weight: weight.value,
    bench: bench.value,
    squat: squat.value,
    situps: situps.value,
    vertical: vertical.value,
    broad: broad.value,
    agility: agility.value,
    clean: clean.value,
    medball: medball.value,
    ten: ten.value,
    forty: forty.value
  };

  try {
    await fetch(SCHOOL_CONFIG.submitURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    formMessage.innerHTML = "<span style='color:lime;'>✅ Saved</span>";

    document.querySelectorAll("input, select").forEach(el => el.value = "");

  } catch (err) {
    console.error(err);
    formMessage.innerHTML = "<span style='color:red;'>❌ Failed</span>";
  }
}

document.getElementById("submitBtn").addEventListener("click", submitForm);
</script>

</body>
</html>
