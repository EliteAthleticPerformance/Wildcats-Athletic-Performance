<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Enter Athlete Data</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

<!-- 🔒 COACH ACCESS -->
<script>
(function () {
  const PASSWORD = "Coach123";

  let access = sessionStorage.getItem("coachAccess");

  if (access !== "true") {
    const pass = prompt("Enter coach password:");

    if (pass === PASSWORD) {
      sessionStorage.setItem("coachAccess", "true");
    } else {
      alert("Access denied");

      const base = window.location.pathname.includes("/Elite-Athletic-Performance/")
        ? "/Elite-Athletic-Performance/"
        : "/";

      window.location.href = base + "index.html";
    }
  }
})();
</script>

</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- 🔥 CORRECT LOAD ORDER -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

<!-- TITLE -->
<section class="section" style="text-align:center;">
  <h1>🏋️ Enter Athlete Test</h1>
  <p style="color: var(--muted)">Record performance data</p>
</section>

<section class="section">
<div class="card">

<div id="formMessage" style="text-align:center; margin-bottom:10px;"></div>

<!-- ATHLETE INFO -->
<div class="form-section">
  <h2>ATHLETE INFO</h2>
  <div class="form-grid cols-4">
    <input id="name" placeholder="Last, First (ex: Maxwell, Brent)">
    <input id="date" type="date">

    <select id="gender">
  <option value="">Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

    <select id="grade">
      <option value="">Grade</option>
      <option>6</option><option>7</option><option>8</option>
      <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>

    <input id="weight" type="number" placeholder="Weight (lbs)">
  </div>
</div>

<!-- STRENGTH -->
<div class="form-section">
  <h2>STRENGTH</h2>
  <div class="form-grid cols-3">
    <input id="bench" type="number" placeholder="Bench">
    <input id="squat" type="number" placeholder="Squat">
    <input id="situps" type="number" placeholder="Sit-Ups">
  </div>
</div>

<!-- EXPLOSIVE -->
<div class="form-section">
  <h2>EXPLOSIVE</h2>
  <div class="form-grid cols-3">
    <input id="vertical" type="number" placeholder="Vertical (inches)">

    <select id="broad">
      <option value="">Broad</option>
       <option>4.00</option> <option>4.03</option> <option>4.06</option> <option>4.09</option>
       <option>5.00</option> <option>5.03</option> <option>5.06</option> <option>5.09</option>
      <option>6.00</option> <option>6.03</option> <option>6.06</option> <option>6.09</option>
      <option>7.00</option> <option>7.03</option> <option>7.06</option> <option>7.09</option>
      <option>8.00</option> <option>8.03</option> <option>8.06</option> <option>8.09</option>
      <option>9.00</option> <option>9.03</option> <option>9.06</option> <option>9.09</option>
      <option>10.00</option> <option>10.03</option> <option>10.06</option>
    </select>

    <input id="agility" type="number" step="0.01" placeholder="Pro Agility (sec)">
  </div>
</div>

<!-- POWER -->
<div class="form-section">
  <h2>POWER</h2>
  <div class="form-grid cols-2">
    <input id="clean" type="number" placeholder="Clean">
    <select id="medball">
      <option value="">Med Ball Toss</option>
      <option>10.00</option> <option>10.03</option> <option>10.06</option> <option>10.09</option>
       <option>11.00</option> <option>11.03</option> <option>11.06</option> <option>11.09</option>
       <option>12.00</option> <option>12.03</option> <option>12.06</option> <option>12.09</option>
        <option>13.00</option> <option>13.03</option> <option>13.06</option> <option>13.09</option>
        <option>14.00</option> <option>14.03</option> <option>14.06</option> <option>14.09</option>
       <option>15.00</option> <option>15.03</option> <option>15.06</option> <option>15.09</option>
      <option>16.00</option> <option>16.03</option> <option>16.06</option> <option>16.09</option>
       <option>17.00</option> <option>17.03</option> <option>17.06</option> <option>17.09</option>
      <option>18.00</option> <option>18.03</option> <option>18.06</option> <option>18.09</option>
       <option>19.00</option> <option>19.03</option> <option>19.06</option> <option>19.09</option>
      <option>20.00</option> <option>20.03</option> <option>20.06</option> <option>20.9</option>
    </select>
  </div>
</div>

<!-- SPEED -->
<div class="form-section">
  <h2>SPEED</h2>
  <div class="form-grid cols-2">
    <input id="ten" type="number" step="0.01" placeholder="10 Yard (sec)">

    <input id="forty" type="number" step="0.01" placeholder="40 Yard (sec)">
  </div>
</div>

<!-- SUBMIT -->
<div style="text-align:center; margin-top:20px;">
  <button class="save-btn" id="submitBtn">💾 Save Test</button>
</div>

</div>
</section>

</main>

<!-- DATA + LOGIC -->

<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/enter.js"></script>

<!-- AUTO DATE -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("date");
  if (dateInput && !dateInput.value) {
    dateInput.value = new Date().toISOString().split("T")[0];
  }
});
</script>

</body>
</html>
