<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Enter Athlete Data</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

<!-- 🔒 COACH ACCESS -->
<script>
(function () {
  const PASSWORD = "Coach123";

  let access = sessionStorage.getItem("coachAccess");

  if (access !== "true") {
    const pass = prompt("Enter coach password:");

    if (pass === PASSWORD) {
      sessionStorage.setItem("coachAccess", "true");
    } else {
      alert("Access denied");

      const base = window.location.pathname.includes("/Elite-Athletic-Performance/")
        ? "/Elite-Athletic-Performance/"
        : "/";

      window.location.href = base + "index.html";
    }
  }
})();
</script>

</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- 🔥 CORRECT LOAD ORDER -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

<!-- TITLE -->
<section class="section" style="text-align:center;">
  <h1>🏋️ Enter Athlete Test</h1>
  <p style="color: var(--muted)">Record performance data</p>
</section>

<section class="section">
<div class="card">

<div id="formMessage" style="text-align:center; margin-bottom:10px;"></div>

<!-- ATHLETE INFO -->
<div class="form-section">
  <h2>ATHLETE INFO</h2>
  <div class="form-grid cols-4">
    <input id="name" placeholder="Last, First (ex: Maxwell, Brent)">
    <input id="date" type="date">

    <select id="gender">
  <option value="">Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

    <select id="grade">
      <option value="">Grade</option>
      <option>6</option><option>7</option><option>8</option>
      <option>9</option><option>10</option><option>11</option><option>12</option>
    </select>

    <input id="weight" type="number" placeholder="Weight (lbs)">
  </div>
</div>

<!-- STRENGTH -->
<div class="form-section">
  <h2>STRENGTH</h2>
  <div class="form-grid cols-3">
    <input id="bench" type="number" placeholder="Bench">
    <input id="squat" type="number" placeholder="Squat">
    <select id="situps">
      <option value="">Sit-Ups</option>
      <option>30</option><option>40</option>
      <option>50</option><option>60</option><option>70</option>
    </select>
  </div>
</div>

<!-- EXPLOSIVE -->
<div class="form-section">
  <h2>EXPLOSIVE</h2>
  <div class="form-grid cols-3">
    <select id="vertical">
      <option value="">Vertical</option>
      <option>20</option><option>22</option><option>24</option>
      <option>26</option><option>28</option><option>30</option>
      <option>32</option><option>34</option><option>36</option>
    </select>

    <select id="broad">
      <option value="">Broad</option>
      <option>6.00</option><option>7.00</option>
      <option>8.00</option><option>9.00</option><option>10.00</option>
    </select>

    <select id="agility">
      <option value="">Pro Agility</option>
      <option>4.2</option><option>4.4</option>
      <option>4.6</option><option>4.8</option><option>5.0</option>
    </select>
  </div>
</div>

<!-- POWER -->
<div class="form-section">
  <h2>POWER</h2>
  <div class="form-grid cols-2">
    <input id="clean" type="number" placeholder="Clean">
    <select id="medball">
      <option value="">Med Ball Toss</option>
      <option>10</option><option>12</option><option>14</option>
      <option>16</option><option>18</option><option>20</option>
    </select>
  </div>
</div>

<!-- SPEED -->
<div class="form-section">
  <h2>SPEED</h2>
  <div class="form-grid cols-2">
    <select id="ten">
      <option value="">10 Yard</option>
      <option>1.2</option><option>1.4</option>
      <option>1.6</option><option>1.8</option><option>2.0</option>
    </select>

    <select id="forty">
      <option value="">40 Yard</option>
      <option>4.4</option><option>4.6</option>
      <option>4.8</option><option>5.0</option><option>5.2</option>
    </select>
  </div>
</div>

<!-- SUBMIT -->
<div style="text-align:center; margin-top:20px;">
  <button class="save-btn" id="submitBtn">💾 Save Test</button>
</div>

</div>
</section>

</main>

<!-- DATA + LOGIC -->

<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/enter.js"></script>

<!-- AUTO DATE -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("date");
  if (dateInput && !dateInput.value) {
    dateInput.value = new Date().toISOString().split("T")[0];
  }
});
</script>

</body>
</html>
