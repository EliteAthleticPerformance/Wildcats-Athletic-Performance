<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Leaderboard | Wildcats Performance</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script>
  window.pageTitle = "Team Leaderboard";
</script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1 class="leaderboard-title">🏆 Team Leaderboard</h1>
  </section>

  <!-- SEARCH -->
  <section class="section">
    <input id="leaderboardSearch" class="search" placeholder="Search athlete...">
  </section>

  <!-- GRID -->
  <section class="section">
<div class="podium-wrapper">
  <h2 class="podium-title">🏆 Harrisonville Wildcats Top 3 Athletes</h2>
  <div id="podium" class="podium-container"></div>
</div>
    <div class="leaderboard-grid">

      <!-- ===== LIFT TOTALS ===== -->
      
Elite / Strong / Average / Needs Work Identifiers = Correlation of Weight Lifted Transferring to Athletic Movement Skills
<div class="leaderboard-grid">

  <!-- LEFT: 3 LIFT -->
  <div class="leaderboard-card">
    <h2>🏋️ 3 Lift Max Totals</h2>

    <div class="table-scroll">
      <table id="liftTable" class="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Total</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: PERFORMANCE -->
  <div class="leaderboard-card">
    <h2>⚡ Athletic Performance Scores</h2>

    <div class="table-scroll">
      <table id="scoreTable" class="leaderboard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Score</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

        <!-- MOBILE -->
        <div id="mobileLift" class="mobile-cards"></div>
      

        <!-- MOBILE -->
        <div id="mobileScore" class="mobile-cards"></div>
      </div>

    </div>

  </section>

</main>

<!-- ===== SCRIPT ===== -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./js/themeLoader.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
