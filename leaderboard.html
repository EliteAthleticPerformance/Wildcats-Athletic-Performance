<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Leaderboard | Elite Athletic Performance</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script>
  window.pageTitle = "Team Leaderboard";
</script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1 class="leaderboard-title">🏆 Team Leaderboard</h1>
  </section>

  <!-- SEARCH -->
 <section class="section">

  <div class="podium-wrapper">
    <h2 id="podiumTitle" class="podium-title">🏆 Top 3 Athletes</h2>
    <div id="podium" class="podium-container"></div>
  </div>

  <!-- ✅ ONE GRID ONLY -->
  <div class="leaderboard-grid">

    <!-- LEFT: 3 LIFT -->
    <div class="leaderboard-card">
      <h2>🏋️ 3 Lift Max Totals</h2>

      <div class="table-scroll">
        <table id="liftTable" class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Total</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- MIDDLE: PERFORMANCE -->
    <div class="leaderboard-card">
      <h2>⚡ Athletic Performance Scores</h2>

      <div class="table-scroll">
        <table id="scoreTable" class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- RIGHT: KEY -->
    <div class="leaderboard-card key-card">
      <h2>🔑 Identifier Key</h2>

      <div class="key-content">
        Elite / Strong / Average / Needs Work Identifiers =
        <br><br>
        Correlation of Athletic Movement Skills Compared to Weight Lifted
      </div>
    </div>

  </div>

  <!-- MOBILE -->
  <div id="mobileLift" class="mobile-cards"></div>
  <div id="mobileScore" class="mobile-cards"></div>

</section>

</main>

<!-- ===== SCRIPT ===== -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./js/themeLoader.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
