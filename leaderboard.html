<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Leaderboard</title>

<link rel="stylesheet" href="styles.css?v=4">
</head>

<body>

<div id="header-placeholder"></div>

<main>

<div id="leaderboard">

<h1>🏆 Team Leaderboard</h1>

<!-- 🔍 SEARCH -->
<input 
type="text" 
id="leaderboardSearch" 
placeholder="Search athlete..."
>

<div class="leaderboard-grid">

  <!-- LEFT -->
  <div class="leaderboard-left">
    <h2>3 Lift Max Totals</h2>
    <table id="totalTable">
      <thead>
  <tr>
    <th>Rank</th>
    <th>Athlete</th>
    <th>Total</th>
    <th>Test Date</th>
  </tr>
</thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- RIGHT -->
  <div class="leaderboard-right">
    <h2>Athletic Performance Score</h2>
    <table id="leaderboardTable">
      <thead>
  <tr>
    <th>Rank</th>
    <th>Athlete</th>
    <th>Points</th>
    <th>Test Date</th>
  </tr>
</thead>
      <tbody></tbody>
    </table>
  </div>

</div>

</div>

</main>

<script src="js/header.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
