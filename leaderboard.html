<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<title>Leaderboard | Wildcats Performance</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script>
  window.pageTitle = "Team Leaderboard";
</script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1 class="leaderboard-title">🏆 Team Leaderboard</h1>
  </section>

  <!-- SEARCH -->
  <section class="section">
    <input id="search" class="search" placeholder="Search athlete...">
  </section>

  <!-- GRID -->
  <section class="section">

    <div class="leaderboard-grid">

      <!-- ===== LIFT TOTALS ===== -->
      <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">
          🏋️ 3 Lift Max Totals
        </h2>

        <div class="table-wrapper">
          <table id="liftTable" class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>Athlete</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- MOBILE -->
        <div id="mobileLift" class="mobile-cards"></div>
      </div>

      <!-- ===== PERFORMANCE SCORE ===== -->
      <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">
          🏆 Athletic Performance
        </h2>

        <div class="table-wrapper">
          <table id="scoreTable" class="table">
            <thead>
              <tr>
                <th>#</th>
                <th>Athlete</th>
                <th>Score</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- MOBILE -->
        <div id="mobileScore" class="mobile-cards"></div>
      </div>

    </div>

  </section>

</main>

<!-- ===== SCRIPT ===== -->
<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

let grouped = {};
let athletes = [];

/* ---------- LOAD DATA ---------- */

fetch(url + "&t=" + Date.now())
.then(res => res.text())
.then(text => {

  const rows = text.trim().split("\n");
  const headers = rows[0].split(",").map(h => h.trim());

  const data = rows.slice(1).map(row => {
    const cols = (row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [])
      .map(c => c.replace(/"/g, "").trim());

    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i]);

    return {
      name: obj["Student-Athlete"],
      date: obj["Test Date"],

      bench: +obj["Bench Press"] || 0,
      squat: +obj["Squat"] || 0,
      clean: +obj["Hang Clean"] || 0,

      vertical: +obj["Vertical Jump"] || 0,
      broad: +obj["Broad Jump"] || 0,
      med: +obj["Med Ball Toss"] || 0,

      pro: +obj["Pro Agility"] || 0,
      ten: +obj["10 yd Dash"] || 0,
      forty: +obj["40 yd Dash"] || 0,

      sit: +obj["Sit-Ups"] || 0,

      lift: +obj["3 Lift Projected Max Total"] || 0,
      score: +obj["Total Athletic Performance Points"] || 0
    };
  });

  data.forEach(a => {
    if (!grouped[a.name]) grouped[a.name] = [];
    grouped[a.name].push(a);
  });

  Object.values(grouped).forEach(arr => {
    arr.sort((a, b) => new Date(b.date) - new Date(a.date));
  });

  athletes = Object.keys(grouped).map(n => grouped[n][0]);

  render();
});

/* ---------- RENDER ---------- */

function render() {
  const val = document.getElementById("search").value.toLowerCase();

  const filtered = athletes.filter(a =>
    a.name.toLowerCase().includes(val)
  );

  renderLift([...filtered]);
  renderScore([...filtered]);
}

/* ---------- LIFT TABLE ---------- */

function renderLift(data) {

  const tbody = document.querySelector("#liftTable tbody");
  const mobile = document.getElementById("mobileLift");

  tbody.innerHTML = "";
  mobile.innerHTML = "";

  data.sort((a, b) => b.lift - a.lift);

  data.forEach((a, i) => {

    const medal = i === 0 ? "rank-1" :
                  i === 1 ? "rank-2" :
                  i === 2 ? "rank-3" : "";

    tbody.appendChild(createRow(a, i, "lift", medal));

    mobile.innerHTML += `
      <div class="card">
        <strong class="${medal}">${i + 1}. ${a.name}</strong><br>
        Total: ${a.lift || "-"}<br>
        ${a.date}
      </div>
    `;
  });
}

/* ---------- SCORE TABLE ---------- */

function renderScore(data) {

  const tbody = document.querySelector("#scoreTable tbody");
  const mobile = document.getElementById("mobileScore");

  tbody.innerHTML = "";
  mobile.innerHTML = "";

  data.sort((a, b) => b.score - a.score);

  data.forEach((a, i) => {

    const medal = i === 0 ? "rank-1" :
                  i === 1 ? "rank-2" :
                  i === 2 ? "rank-3" : "";

    tbody.appendChild(createRow(a, i, "score", medal));

    mobile.innerHTML += `
      <div class="card">
        <strong class="${medal}">${i + 1}. ${a.name}</strong><br>
        Score: ${a.score || "-"}<br>
        ${a.date}
      </div>
    `;
  });
}

/* ---------- ROW + CHART ---------- */

function createRow(a, i, type, medal) {

  const tr = document.createElement("tr");

  tr.innerHTML = `
    <td class="${medal}">${i + 1}</td>
    <td>${a.name}</td>
    <td>${type === "lift" ? a.lift : a.score}</td>
    <td>${a.date}</td>
  `;

  const detail = document.createElement("tr");
  detail.style.display = "none";

  const td = document.createElement("td");
  td.colSpan = 4;
  detail.appendChild(td);

  tr.onclick = () => {

    if (detail.style.display === "table-row") {
      detail.style.display = "none";
      return;
    }

    detail.style.display = "table-row";

    const latest = grouped[a.name][0];

    td.innerHTML = `<canvas id="chart-${i}" height="200"></canvas>`;

    setTimeout(() => {
      new Chart(document.getElementById(`chart-${i}`), {
        type: 'radar',
        data: {
          labels: ["Bench","Squat","Clean","Vertical","Broad","Med","Sit"],
          datasets: [{
            data: [
              latest.bench,
              latest.squat,
              latest.clean,
              latest.vertical,
              latest.broad,
              latest.med,
              latest.sit
            ]
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { r: { ticks: { display: false } } }
        }
      });
    }, 100);
  };

  const frag = document.createDocumentFragment();
  frag.appendChild(tr);
  frag.appendChild(detail);

  return frag;
}

/* ---------- SEARCH ---------- */

document.getElementById("search").addEventListener("input", render);

</script>

</body>
</html>
