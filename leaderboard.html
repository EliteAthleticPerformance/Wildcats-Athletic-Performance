<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";

  sessionStorage.setItem("school", school);

  const theme = JSON.parse(sessionStorage.getItem("theme-" + school));

  if (theme) {
    const root = document.documentElement;

    root.style.setProperty("--primary", theme.primary);
    root.style.setProperty("--primaryLight", theme.primaryLight);
    root.style.setProperty("--primaryDark", theme.primaryDark);
    root.style.setProperty("--secondary", theme.secondary);
    root.style.setProperty("--secondaryLight", theme.secondaryLight);
    root.style.setProperty("--background", theme.background);
  }
})();
</script>

 <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";

  sessionStorage.setItem("school", school);

  const logo = sessionStorage.getItem("logo-" + school);

  if (logo) {
    const img = new Image();
    img.src = logo;

    document.addEventListener("DOMContentLoaded", () => {
      const el = document.getElementById("schoolLogo");
      if (el) el.src = logo;
    });
  }
})();
</script>

<title>Leaderboard | Elite Athletic Performance</title>

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script>
  window.pageTitle = "Team Leaderboard";
</script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- TITLE -->
  <section class="section" style="text-align:center;">
    <h1 class="leaderboard-title">🏆 Team Leaderboard</h1>
  </section>

  <!-- SEARCH -->
 <section class="section">

  <div class="podium-wrapper">
    <h2 id="podiumTitle" class="podium-title">Top 3 Athletes</h2>
    <div id="podium" class="podium-container"></div>
  </div>
   
<div class="leaderboard-card key-card">

  <div class="key-content">

    <div class="key-labels">
      <span class="elite">Elite</span>
      <span class="above">Above Average</span>
      <span class="average">Average</span>
      <span class="needs">Needs Work</span>
    </div>

    <div class="key-description">
      Correlation of Athletic Movement Skills Compared to Weight Lifted
    </div>

  </div>

</div>
  
  <!-- ✅ ONE GRID ONLY -->
  <div class="leaderboard-grid">

    <!-- LEFT: 3 LIFT -->
    <div class="leaderboard-card">
      <h2>🏋️ 3 Lift Max Totals</h2>

      <div class="table-scroll">
        <table id="liftTable" class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Total</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- MIDDLE: PERFORMANCE -->
    <div class="leaderboard-card">
      <h2>⚡ Athletic Performance Scores</h2>

      <div class="table-scroll">
        <table id="scoreTable" class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Score</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

      </div>

  <!-- MOBILE -->
  <div id="mobileLift" class="mobile-cards"></div>
  <div id="mobileScore" class="mobile-cards"></div>

</section>

</main>

<!-- ===== SCRIPT ===== -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./js/themeLoader.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
