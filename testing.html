<!DOCTYPE html>
<html lang="en">

<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Combine Testing</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- 🔥 CORRECT LOAD ORDER -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

  <!-- TITLE -->
  <section class="section">
    <h1 class="leaderboard-title">📋 Combine Testing Results</h1>
  </section>

  <!-- A-Z FILTER -->
  <section class="section" style="text-align:center;">
    <div id="alphabetBar" class="alphabet-bar"></div>
  </section>

  <!-- SEARCH -->
  <section class="section">
    <input 
      type="text" 
      id="searchInput" 
      class="search"
      placeholder="Search athlete name..."
      oninput="filterTable()"
      autocomplete="off"
    >
  </section>

  <!-- TABLE -->
  <section class="section">

    <div class="card">
      <div class="table-wrapper">

        <table id="testingTable" class="table">

          <thead>
            <tr>
              <th onclick="sortTable(0)">Athlete</th>
              <th onclick="sortTable(1)">Date</th>
              <th onclick="sortTable(2)">Hr</th>
              <th onclick="sortTable(3)">Gr</th>
              <th onclick="sortTable(4)">Wt</th>
              <th onclick="sortTable(5)">Group</th>

              <th onclick="sortTable(6)">Bench</th>
              <th onclick="sortTable(7)">Squat</th>
              <th onclick="sortTable(8)">Clean</th>

              <th onclick="sortTable(9)">Vert</th>
              <th onclick="sortTable(10)">Broad</th>
              <th onclick="sortTable(11)">Med</th>

              <th onclick="sortTable(12)">Agility</th>
              <th onclick="sortTable(13)">Sit-Ups</th>
              <th onclick="sortTable(14)">10yd</th>
              <th onclick="sortTable(15)">40yd</th>
            </tr>
          </thead>

          <tbody></tbody>

        </table>

      </div>
    </div>

    <!-- MOBILE -->
    <div id="mobileCards" class="mobile-cards"></div>

  </section>

</main>

<!-- DATA -->
<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>

<!-- 🔥 SAFE LOAD OF PAGE LOGIC -->
<script>
document.addEventListener("headerLoaded", async () => {
  try {
    await window.APP_READY;

    const script = document.createElement("script");
    script.src = "/Elite-Athletic-Performance/js/testing.js";
    document.body.appendChild(script);

  } catch (err) {
    console.error("❌ Testing page failed to init:", err);
  }
});
</script>

<!-- SCHOOL PARAM (CONSISTENT) -->
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  let school = params.get("school");

  if (!school) {
    school = sessionStorage.getItem("school");
  }

  if (school) {
    sessionStorage.setItem("school", school);
  }
})();
</script>

</body>
</html>
