<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";

  sessionStorage.setItem("school", school);

  const theme = JSON.parse(sessionStorage.getItem("theme-" + school));

  if (theme) {
    const root = document.documentElement;

    root.style.setProperty("--primary", theme.primary);
    root.style.setProperty("--primaryLight", theme.primaryLight);
    root.style.setProperty("--primaryDark", theme.primaryDark);
    root.style.setProperty("--secondary", theme.secondary);
    root.style.setProperty("--secondaryLight", theme.secondaryLight);
    root.style.setProperty("--background", theme.background);
  }
})();
</script>

  <script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";

  sessionStorage.setItem("school", school);

  const logo = sessionStorage.getItem("logo-" + school);

  if (logo) {
    // 🔥 preload image immediately
    const img = new Image();
    img.src = logo;

    // 🔥 apply ASAP when DOM is ready
    document.addEventListener("DOMContentLoaded", () => {
      const el = document.getElementById("schoolLogo");
      if (el) el.src = logo;
    });
  }
})();
</script>
  
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<title>Combine Testing</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script>
  window.pageTitle = "Combine Testing";
</script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- PAGE TITLE -->
  <section class="section">
    <h1 class="leaderboard-title">📋 Combine Testing Results</h1>
  </section>

  <!-- A-Z FILTER -->
<section class="section" style="text-align:center;">
  <div id="alphabetBar" class="alphabet-bar"></div>
</section>

  <!-- SEARCH -->
  <section class="section">
    <input 
      type="text" 
      id="searchInput" 
      class="search"
      placeholder="Search athlete name..."
    >
  </section>

  <!-- TABLE CARD -->
  <section class="section">

    <div class="card">

      <div class="table-wrapper">

        <table id="testingTable" class="table">

          <thead>
            <tr>
              <th onclick="sortTable(0)">Athlete</th>
              <th onclick="sortTable(1)">Date</th>
              <th onclick="sortTable(2)">Hr</th>
              <th onclick="sortTable(3)">Gr</th>
              <th onclick="sortTable(4)">Wt</th>
              <th onclick="sortTable(5)">Group</th>

              <th onclick="sortTable(6)">Bench</th>
              <th onclick="sortTable(7)">Squat</th>
              <th onclick="sortTable(8)">Clean</th>

              <th onclick="sortTable(9)">Vert</th>
              <th onclick="sortTable(10)">Broad</th>
              <th onclick="sortTable(11)">Med</th>

              <th onclick="sortTable(12)">Agility</th>
              <th onclick="sortTable(13)">Sit</th>
              <th onclick="sortTable(14)">10yd</th>
              <th onclick="sortTable(15)">40yd</th>
            </tr>
          </thead>

          <div id="mobileCards" class="mobile-cards"></div>

          <tbody>
            <!-- JS injects rows -->
          </tbody>

        </table>

      </div>

    </div>

  </section>

</main>

<!-- ===== SCRIPT ===== -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/themeLoader.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/testing.js"></script>

</body>
</html>
