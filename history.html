<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Enter Performance</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>
<script src="js/header.js"></script>

<main class="section" style="text-align:center;">

<h1 class="school-name"></h1>

<h2>Enter Athlete Performance</h2>

<div class="form">

<input id="name" placeholder="Athlete Name">

<h3>Strength</h3>
<input id="bench" placeholder="Bench">
<input id="squat" placeholder="Squat">
<input id="situps" placeholder="Sit-ups">

<h3>Power</h3>
<input id="clean" placeholder="Clean">
<input id="medball" placeholder="Med Ball Toss">

<h3>Speed</h3>
<input id="tenyd" placeholder="10 yd">
<input id="forty" placeholder="40 yd">

<h3>Explosive</h3>
<input id="vertical" placeholder="Vertical">
<input id="broad" placeholder="Broad">
<input id="agility" placeholder="Pro Agility">

<br><br>

<button id="submitBtn">Submit Performance</button>

</div>

<p id="status" style="margin-top:15px;"></p>

</main>

<!-- 🔥 THEME + CONFIG -->
<script src="./js/themeLoader.js"></script>

<script>

/* ================= WAIT FOR CONFIG ================= */

async function waitForConfig() {
  let attempts = 0;

  while (!window.SCHOOL_CONFIG && attempts < 50) {
    await new Promise(r => setTimeout(r, 50));
    attempts++;
  }

  if (!window.SCHOOL_CONFIG) {
    throw new Error("SCHOOL_CONFIG not ready");
  }
}

/* ================= SUBMIT ================= */

async function submitAthleteData(data) {

  if (!SCHOOL_CONFIG.formURL) {
    document.getElementById("status").textContent = "❌ No form configured";
    return;
  }

  const formData = new FormData();

  // 🔥 REPLACE THESE WITH YOUR REAL GOOGLE FORM ENTRY IDs
  formData.append("entry.1111111111", data.name);
  formData.append("entry.2222222222", data.bench);
  formData.append("entry.3333333333", data.squat);
  formData.append("entry.4444444444", data.situps);
  formData.append("entry.5555555555", data.clean);
  formData.append("entry.6666666666", data.medball);
  formData.append("entry.7777777777", data.tenyd);
  formData.append("entry.8888888888", data.forty);
  formData.append("entry.9999999999", data.vertical);
  formData.append("entry.1010101010", data.broad);
  formData.append("entry.1212121212", data.agility);

  try {
    await fetch(SCHOOL_CONFIG.formURL, {
      method: "POST",
      mode: "no-cors",
      body: formData
    });

    document.getElementById("status").textContent = "✅ Submitted successfully!";

    // optional: clear form
    document.querySelectorAll("input").forEach(i => i.value = "");

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent = "❌ Submission failed";
  }
}

/* ================= CLICK HANDLER ================= */

document.getElementById("submitBtn").addEventListener("click", async () => {

  try {
    await waitForConfig();

    const data = {
      name: document.getElementById("name").value,
      bench: document.getElementById("bench").value,
      squat: document.getElementById("squat").value,
      situps: document.getElementById("situps").value,
      clean: document.getElementById("clean").value,
      medball: document.getElementById("medball").value,
      tenyd: document.getElementById("tenyd").value,
      forty: document.getElementById("forty").value,
      vertical: document.getElementById("vertical").value,
      broad: document.getElementById("broad").value,
      agility: document.getElementById("agility").value
    };

    submitAthleteData(data);

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent = "❌ System not ready";
  }

});

</script>

</body>
</html>
