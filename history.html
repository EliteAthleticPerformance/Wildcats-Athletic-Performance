<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="margin-bottom:20px;"></p>

  <div style="max-width: 500px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

  <!-- Metrics -->
  <div id="metrics" class="grid" style="margin-top:30px;"></div>

</main>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";


// ✅ GET NAME FROM URL
const params = new URLSearchParams(window.location.search);
const selectedName = (params.get("name") || "").trim();

document.getElementById("name").textContent = selectedName;

/* ---------- CLEAN NUMBER FUNCTION ---------- */

function cleanNum(val) {
  return Number((val || "").replace(/\r/g, "").trim()) || 0;
}

/* ---------- LOAD DATA ---------- */

Papa.parse(CSV_URL + "&t=" + Date.now(), {
  download: true,
  skipEmptyLines: true,

  complete: function(results) {

    const rows = results.data;

    let athlete = null;

    // ✅ FIND MATCH
    rows.forEach(row => {
      const name = (row[0] || "").trim().toLowerCase();
      const target = selectedName.toLowerCase();

      if (name === target) {
        athlete = row;
      }
    });

    console.log("MATCH FOUND:", athlete);

    if (!athlete) {
      document.getElementById("score").textContent = "No data found";
      return;
    }

    /* ---------- MAP DATA ---------- */

    const bench = cleanNum(athlete[6]);
    const squat = cleanNum(athlete[8]);
    const clean = cleanNum(athlete[10]);
    const vertical = cleanNum(athlete[12]);
    const broad = cleanNum(athlete[14]);
    const medBall = cleanNum(athlete[16]);
    const agilityRaw = cleanNum(athlete[18]);
    const situps = cleanNum(athlete[20]);
    const dash10 = cleanNum(athlete[22]);
    const dash40 = cleanNum(athlete[24]);
    const score = cleanNum(athlete[30]);

    /* ---------- BUILD METRICS ---------- */

    const strength = bench + squat;
    const power = clean + vertical;
    const explosiveness = broad + medBall;
    const agility = agilityRaw + situps;
    const speed = dash10 + dash40;

    /* ---------- PERFORMANCE TIER ---------- */

    let tier = "Needs Work";
    let color = "#6b7280";

    if (score >= 900) {
      tier = "🔥 Elite";
      color = "#f97316";
    } else if (score >= 800) {
      tier = "💪 Strong";
      color = "#22c55e";
    } else if (score >= 700) {
      tier = "⚡ Developing";
      color = "#eab308";
    }

    document.getElementById("score").innerHTML = `
      <span style="font-size:18px;">Score: ${score}</span><br>
      <span style="color:${color}; font-weight:600;">${tier}</span>
    `;

    /* ---------- NORMALIZE ---------- */

    function norm(val) {
      return Math.min(val / 5, 100);
    }

    renderRadarChart(
      norm(speed),
      norm(strength),
      norm(power),
      norm(agility),
      norm(explosiveness)
    );

    /* ---------- METRIC CARDS ---------- */

    document.getElementById("metrics").innerHTML = `
      <div class="card">Speed<br><strong>${Math.round(speed)}</strong></div>
      <div class="card">Strength<br><strong>${Math.round(strength)}</strong></div>
      <div class="card">Power<br><strong>${Math.round(power)}</strong></div>
      <div class="card">Agility<br><strong>${Math.round(agility)}</strong></div>
      <div class="card">Explosive<br><strong>${Math.round(explosiveness)}</strong></div>
    `;
  }
});

/* ---------- RADAR CHART ---------- */

function renderRadarChart(speed, strength, power, agility, explosiveness) {

  const ctx = document.getElementById("radarChart");
  const gradient = ctx.getContext("2d").createLinearGradient(0, 0, 0, 400);

  gradient.addColorStop(0, "rgba(59,130,246,0.6)");
  gradient.addColorStop(1, "rgba(59,130,246,0.05)");

  new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Agility", "Explosive"],
      datasets: [{
        data: [speed, strength, power, agility, explosiveness],
        backgroundColor: gradient,
        borderColor: "#3b82f6",
        borderWidth: 2,
        pointBackgroundColor: "#3b82f6",
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        r: {
          beginAtZero: true,
          suggestedMax: 100,
          ticks: { display: false },
          grid: {
            color: "rgba(255,255,255,0.08)"
          },
          angleLines: {
            color: "rgba(255,255,255,0.1)"
          },
          pointLabels: {
            color: "#aaa",
            font: {
              size: 13,
              weight: "600"
            }
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
