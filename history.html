
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Athlete Profile</title>

  <script>
  window.pageTitle = "Performance Comparison";
</script>

<link rel="stylesheet" href="styles.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="margin-bottom:20px;"></p>
   Compare To:
<div class="compare-toggle">
  <button onclick="setCompareMode('last')" id="btn-last">Most Recent Test</button>
  <button onclick="setCompareMode('team')" class="active" id="btn-team">Team</button>
  <button onclick="setCompareMode('top5')" id="btn-top5">Top 5</button>
  <button onclick="setCompareMode('weight')" id="btn-weight">Weight Group</button>
  <button onclick="setCompareMode('grade')" id="btn-grade">Grade</button>
  </div>

 

  <div style="max-width: 750px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

  <div id="insights" class="insights-box"></div>

  <div id="metrics" class="grid" style="margin-top:30px;"></div>

</main>

<script>

/* ================= CONFIG ================= */

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

/* ================= GLOBAL ================= */

let ALL_ROWS = [];
let CURRENT_ATHLETE = null;
let compareMode = "team";
  let comparisonName = "Comparison";

/* ================= PARAMS ================= */

const params = new URLSearchParams(window.location.search);
const selectedName = decodeURIComponent(params.get("name") || "");

document.getElementById("name").textContent = selectedName;

/* ================= HELPERS ================= */

function cleanNum(val) {
  return Number((val || "").toString().trim()) || 0;
}

function extractMetrics(row) {

  if (!row || row.length < 34) {
    return { speed: 0, strength: 0, power: 0, explosive: 0 };
  }

  if (!row[30] && !row[31] && !row[32] && !row[33]) {
    return { speed: 0, strength: 0, power: 0, explosive: 0 };
  }

  return {
    speed: cleanNum(row[30]),
    strength: cleanNum(row[31]),
    power: cleanNum(row[32]),
    explosive: cleanNum(row[33])
  };
}
  
  function isValidMetrics(m) {
  return (
    m.speed > 0 &&
    m.strength > 0 &&
    m.power > 0 &&
    m.explosive > 0
  );
}

  function getDominantTrait(metrics) {
  return Object.entries(metrics)
    .sort((a, b) => b[1] - a[1])[0][0];
}

/* ================= LOAD DATA ================= */

Papa.parse(CSV_URL, {
  download: true,
  header: false,
  complete: function(results) {

    const rows = results.data || [];

    // 🔥 CLEAN ROWS (NO CRASHES)
    ALL_ROWS = rows.filter(r =>
      Array.isArray(r) &&
      r.length > 34 &&
      (r[0] || "").trim() !== ""
    );

    CURRENT_ATHLETE = getBestRow(ALL_ROWS, selectedName);

    if (!CURRENT_ATHLETE) {
      document.getElementById("score").textContent = "No data found";
      return;
    }
updateComparison();
  }
});

/* ================= BEST PERFORMANCE ================= */

function getBestRow(rows) {

  let best = null;
  let bestScore = -Infinity;

  rows.forEach(r => {
    const score = cleanNum(r[34]);
    const m = extractMetrics(r);

    // 🔥 ONLY allow complete rows
    if (!isValidMetrics(m)) return;

    if (score > bestScore) {
      best = r;
      bestScore = score;
    }
  });

  return best;
}

/* ================= COMPARE MODE ================= */


  
function setCompareMode(mode) {
  compareMode = mode;

  document.querySelectorAll(".compare-toggle button")
    .forEach(btn => btn.classList.remove("active"));

  document.getElementById(`btn-${mode}`).classList.add("active");

  updateComparison();
}

/* ================= MAIN ENGINE ================= */

function updateComparison() {

  const player = extractMetrics(CURRENT_ATHLETE);
  const dominant = getDominantTrait(player);

  const score = cleanNum(CURRENT_ATHLETE[34]);

  document.getElementById("score").innerHTML = `
    <span style="font-size:24px;">Score: ${score}</span>
    <div style="margin-top:8px; color:#3b82f6; font-weight:600;">
      Dominant: ${dominant.toUpperCase()}
    </div>
  `;

  let group = [];

  if (compareMode === "last") {
  comparisonName = "Previous Test";

  const normalize = str => (str || "").toLowerCase().trim();

  const athleteRows = ALL_ROWS
    .filter(r => normalize(r[0]) === normalize(selectedName))
    .filter(r => r[1]) // must have date
    .sort((a, b) => new Date(b[1] || 0) - new Date(a[1] || 0));

  // 🔥 find FIRST valid previous test
  let previous = null;

  for (let i = 1; i < athleteRows.length; i++) {
    const m = extractMetrics(athleteRows[i]);
    if (isValidMetrics(m)) {
      previous = athleteRows[i];
      break;
    }
  }

  group = previous ? [previous] : [CURRENT_ATHLETE];
}


  if (compareMode === "team") {
  comparisonName = "Team Avg";
  group = ALL_ROWS.filter(r => r !== CURRENT_ATHLETE);
}

 if (compareMode === "top5") {
  comparisonName = "Top 5 Avg";

  const normalize = str =>
    (str || "").toLowerCase().trim();

  // 🔥 Step 1: group by athlete name
  const athleteMap = {};

  ALL_ROWS.forEach(r => {
    const name = normalize(r[0]);
    if (!name) return;

    if (!athleteMap[name]) {
      athleteMap[name] = [];
    }

    athleteMap[name].push(r);
  });

  // 🔥 Step 2: get BEST row per athlete
  const bestRows = Object.values(athleteMap).map(rows =>
    getBestRow(rows)
  );

  // 🔥 Step 3: filter valid
  const validRows = bestRows.filter(r => {
    const m = extractMetrics(r);
    return isValidMetrics(m);
  });

  // 🔥 Step 4: sort + take top 5
  group = validRows
    .sort((a, b) => cleanNum(b[34]) - cleanNum(a[34]))
    .slice(0, 5);
}

  if (compareMode === "weight") {
  comparisonName = "Weight Group";
  const weight = cleanNum(CURRENT_ATHLETE[5]);
  group = ALL_ROWS.filter(r => {
    return Math.abs(cleanNum(r[5]) - weight) <= 15;
  });
}

  if (compareMode === "grade") {
  comparisonName = "Grade Group";
  const grade = CURRENT_ATHLETE[3];
  group = ALL_ROWS.filter(r =>
    r[3] === grade && r !== CURRENT_ATHLETE
  );
}

if (!group.length) group = [CURRENT_ATHLETE];

  const avg = calculateAverage(group);

  renderRadarChart(player, avg);
renderRankings(player);
generateInsights(player, avg);
}


/* ================= AVERAGES ================= */

function calculateAverage(group) {

  let totals = { speed: 0, strength: 0, power: 0, explosive: 0 };
  let count = 0;

  group.forEach(r => {

  const m = extractMetrics(r);

  // skip bad rows
  if (!isValidMetrics(m)) return;

  totals.speed += m.speed;
  totals.strength += m.strength;
  totals.power += m.power;
  totals.explosive += m.explosive;

  count++;
});

  if (count === 0) count = 1;

  return {
    speed: Math.round(totals.speed / count),
    strength: Math.round(totals.strength / count),
    power: Math.round(totals.power / count),
    explosive: Math.round(totals.explosive / count)
  };
}

/* ================= RADAR ================= */

function renderRadarChart(player, avg) {

  const ctx = document.getElementById("radarChart");

  if (window.radarChart && typeof window.radarChart.destroy === "function") {
    window.radarChart.destroy();
  }

  window.radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Explosive"],
      datasets: [
  {
    label: selectedName,
    data: [
      player.speed,
      player.strength,
      player.power,
      player.explosive
    ],
    borderColor: "#3b82f6",
    backgroundColor: "rgba(59,130,246,0.35)",
    borderWidth: 5
  },
  {
    label: comparisonName,
    data: [
      avg.speed,
      avg.strength,
      avg.power,
      avg.explosive
    ],
    borderColor: "#ec4899",
    backgroundColor: "rgba(236,72,153,0.25)",
    borderWidth: 3
  }
]
    },

    // ✅ FIXED SECTION
    options: {
      plugins: {
        legend: {
          labels: {
            color: "#fff",
            font: { 
              size: 22,
              weight: "bold"
            },
            padding: 20
          }
        }
      },
      scales: {
        r: {
          pointLabels: {
            color: "#fff",
            font: { 
              size: 20,
              weight: "bold"
            }
          },
          ticks: {
            color: "#aaa",
            backdropColor: "transparent",
            font: { 
              size: 16
            }
          }
        }
      }
    }
  });
}

/* ================= RANKINGS ================= */

function renderRankings(player) {

  const container = document.getElementById("metrics");

  function getColor(val) {
    if (val >= 85) return "elite";
    if (val >= 70) return "strong";
    if (val >= 50) return "developing";
    return "weak";
  }

  function card(label, value, index) {
    const level = getColor(value);

    return `
      <div class="metric-card ${level}" style="animation-delay:${index * 0.08}s">
        <div class="metric-label">${label}</div>
        <div class="metric-value" data-value="${value}">0</div>
        <div class="metric-bar">
          <div class="metric-fill" data-width="${value}%"></div>
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="metrics-grid">
      ${card("Speed", player.speed, 0)}
      ${card("Strength", player.strength, 1)}
      ${card("Power", player.power, 2)}
      ${card("Explosive", player.explosive, 3)}
    </div>
  `;

  animateMetrics(); // 🔥 trigger animation
}

  function generateInsights(player, avg) {

  const container = document.getElementById("insights");

  if (!container) return;

  const insights = [];

  function compare(label, playerVal, avgVal) {
    const diff = playerVal - avgVal;

    if (diff > 15) {
      insights.push(`🟢 ${label} is a major strength (+${diff})`);
    } else if (diff > 5) {
      insights.push(`🟢 ${label} is above average (+${diff})`);
    } else if (diff < -5) {
      insights.push(`🔴 ${label} needs improvement (${diff})`);
    } else if (diff < -15) {
      insights.push(`🟡 ${label} is slightly below average (${diff})`);
    }
  }

  compare("Speed", player.speed, avg.speed);
  compare("Strength", player.strength, avg.strength);
  compare("Power", player.power, avg.power);
  compare("Explosive", player.explosive, avg.explosive);

  // 🔥 dominant trait
  const dominant = Object.entries(player)
    .sort((a, b) => b[1] - a[1])[0][0];

  insights.unshift(`🔥 Dominant trait: ${dominant.toUpperCase()}`);

  // 📉 weakest trait
  const weakest = Object.entries(player)
    .sort((a, b) => a[1] - b[1])[0][0];

  insights.push(`📉 Biggest opportunity: ${weakest.toUpperCase()}`);

  container.innerHTML = `
    <div class="insights-title">Performance Insights</div>
    <ul>
      ${insights.map(i => `<li>${i}</li>`).join("")}
    </ul>
  `;
}

function animateMetrics() {

  // 🔢 COUNT-UP NUMBERS
  document.querySelectorAll(".metric-value").forEach(el => {
    const target = Number(el.dataset.value);
    let current = 0;

    const step = Math.ceil(target / 30);

    const interval = setInterval(() => {
      current += step;

      if (current >= target) {
        current = target;
        clearInterval(interval);
      }

      el.textContent = current;
    }, 20);
  });

  // 📊 BAR FILL ANIMATION
  document.querySelectorAll(".metric-fill").forEach(el => {
    const width = el.dataset.width;

    setTimeout(() => {
      el.style.width = width;
    }, 200);
  });
}

 
  </script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./js/themeLoader.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/header.js"></script>

</body>
</html>
