<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Athlete History</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TGRNFWTPJ5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    gtag('js', new Date());
    gtag('config', 'G-TGRNFWTPJ5');
  </script>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- 🔥 LOAD ORDER -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

<section class="section" style="text-align:center;">
  <h1 id="historyTitle">Athlete History</h1>
</section>

<section class="section">
  <div id="historyContainer"></div>
</section>

</main>

<!-- DATA + LOGIC -->
<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>

<script>
/* ========================================
   INIT
======================================== */

document.addEventListener("headerLoaded", init);

async function init() {
  try {
    await window.APP_READY;

    const data = await loadAthleteData();

    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");

    if (name) {
      renderSingle(name, data);
    } else {
      renderAll(data);
    }

  } catch (err) {
    console.error(err);
    showError("Failed to load history");
  }
}

/* ========================================
   SINGLE ATHLETE
======================================== */

function renderSingle(name, data) {
  const container = document.getElementById("historyContainer");

  const history = data
    .filter(a => a.name === name)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  if (!history.length) {
    container.innerHTML = `<p>No data found</p>`;
    return;
  }

  document.getElementById("historyTitle").textContent = name;

  container.innerHTML = `
    <div class="card">
      <canvas id="chart" height="120"></canvas>
    </div>
  `;

  renderChart(history);
}

/* ========================================
   ALL ATHLETES
======================================== */

function renderAll(data) {
  const container = document.getElementById("historyContainer");

  const names = [...new Set(data.map(a => a.name))];

  container.innerHTML = names.map(n => `
    <div class="card" onclick="goTo('${n}')">
      ${n}
    </div>
  `).join("");
}

/* ========================================
   CHART
======================================== */

function renderChart(history) {
  const ctx = document.getElementById("chart");

  if (!ctx || typeof Chart === "undefined") return;

  new Chart(ctx, {
    type: "line",
    data: {
      labels: history.map(a => a.date),
      datasets: [{
        label: "Score",
        data: history.map(a => a.score),
        tension: 0.3
      }]
    }
  });
}

/* ========================================
   NAV
======================================== */

function goTo(name) {
  const school = new URLSearchParams(window.location.search).get("school");

  window.location.href = school
    ? `history.html?name=${encodeURIComponent(name)}&school=${school}`
    : `history.html?name=${encodeURIComponent(name)}`;
}

/* ========================================
   ERROR
======================================== */

function showError(msg) {
  document.getElementById("historyContainer").innerHTML = `<p>${msg}</p>`;
}
</script>
