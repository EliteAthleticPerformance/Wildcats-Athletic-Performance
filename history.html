<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Athlete History</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:999; }
.modal.hidden { display:none; }
.modal-content { background:#111; padding:20px; border-radius:12px; width:300px; box-shadow:0 0 20px var(--primary); }
.modal-content input { width:100%; margin:8px 0; padding:8px; }
.modal-actions { display:flex; justify-content:space-between; }

.toast { position:fixed; bottom:20px; right:20px; background:#111; padding:10px 16px; border-radius:8px; display:flex; gap:10px; box-shadow:0 0 10px var(--primary); }
.toast.hidden { display:none; }

.row-actions { margin-top:8px; display:flex; gap:8px; }
</style>
</head>

<body>

<div id="header-placeholder"></div>

<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<main>

<section class="section" style="text-align:center;">
  <h1 id="historyTitle">Athlete History</h1>
</section>

<section class="section">
  <div id="historyContainer"></div>
</section>

</main>

<!-- EDIT MODAL -->
<div id="editModal" class="modal hidden">
  <div class="modal-content">
    <h3>Edit Athlete</h3>
    <input id="editName">
    <input id="editBench">
    <input id="editSquat">
    <input id="editClean">
    <div class="modal-actions">
      <button onclick="saveEdit()">Save</button>
      <button onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden">
  <span>Deleted</span>
  <button onclick="undoDelete()">Undo</button>
</div>

<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/historyActions.js"></script>

<script>
let CURRENT_NAME = null;
let DATA_MAP = {};

document.addEventListener("headerLoaded", init);

async function init() {
  await window.APP_READY;

  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");

  CURRENT_NAME = name;

  const data = await loadAthleteData();

  if (name) renderSingle(name, data);
  else renderAll(data);
}

function renderSingle(name, data) {
  const container = document.getElementById("historyContainer");

  const history = data
    .filter(a => a.name === name)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  if (!history.length) {
    container.innerHTML = `<p>No data found</p>`;
    return;
  }

  // BUILD MAP
  DATA_MAP = {};
  history.forEach(r => DATA_MAP[r.id] = r);

  document.getElementById("historyTitle").textContent = name;

  container.innerHTML = `
    <div class="card">
      <canvas id="chart" height="120"></canvas>
    </div>

    ${history.map(r => `
      <div class="card">
        <div>${r.date}</div>
        <div>Bench: ${r.bench || "-"}</div>
        <div>Squat: ${r.squat || "-"}</div>
        <div>Clean: ${r.clean || "-"}</div>

        <div class="row-actions">
          <button onclick="openEditById('${r.id}')">✏️</button>
          <button onclick="deleteById('${r.id}')">🗑</button>
        </div>
      </div>
    `).join("")}
  `;

  renderChart(history);
}

function openEditById(id) {
  const row = DATA_MAP[id];
  if (!row) return;
  openEdit(row);
}

function deleteById(id) {
  const row = DATA_MAP[id];
  if (!row) return;
  deleteRow(row);
}

function renderAll(data) {
  const container = document.getElementById("historyContainer");

  const names = [...new Set(data.map(a => a.name))];

  container.innerHTML = names.map(n => `
    <div class="card" onclick="goTo('${n}')">
      ${n}
    </div>
  `).join("");
}

async function refresh() {
  const data = await loadAthleteData();
  renderSingle(CURRENT_NAME, data);
}

function renderChart(history) {
  const ctx = document.getElementById("chart");

  new Chart(ctx, {
    type:"line",
    data:{
      labels:history.map(a=>a.date),
      datasets:[{
        label:"Score",
        data:history.map(a=>a.score),
        tension:0.3
      }]
    }
  });
}

function goTo(name) {
  const school = new URLSearchParams(window.location.search).get("school");

  window.location.href = school
    ? `history.html?name=${encodeURIComponent(name)}&school=${school}`
    : `history.html?name=${encodeURIComponent(name)}`;
}
</script>

</body>
</html>
