<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="margin-bottom:20px;"></p>

  <div class="compare-toggle">
  <button onclick="setCompareMode('team')" class="active" id="btn-team">Team</button>
  <button onclick="setCompareMode('top5')" id="btn-top5">Top 5</button>
  <button onclick="setCompareMode('weight')" id="btn-weight">Weight Group</button>
</div>

  <div style="max-width: 500px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

  <!-- Metrics -->
  <div id="metrics" class="grid" style="margin-top:30px;"></div>

</main>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THGtlSa9WVaa77owi-_BAR/pub?output=csv";

/* ================= GLOBAL ================= */

let compareMode = "team";
let ALL_ROWS = [];
let CURRENT_ATHLETE = null;

/* ================= BUTTON ================= */

function setCompareMode(mode) {
  compareMode = mode;

  document.querySelectorAll(".compare-toggle button")
    .forEach(btn => btn.classList.remove("active"));

  document.getElementById(`btn-${mode}`).classList.add("active");

  updateComparison();
}

/* ================= NAME ================= */

const params = new URLSearchParams(window.location.search);
const selectedName = (params.get("name") || "").trim().toLowerCase();

document.getElementById("name").textContent =
  decodeURIComponent(params.get("name") || "");

/* ================= HELPERS ================= */

function cleanNum(val) {
  return Number((val || "").replace(/\r/g, "").trim()) || 0;
}

function extractMetrics(row) {

  const bench = cleanNum(row[8]);
  const squat = cleanNum(row[11]);
  const clean = cleanNum(row[14]);
  const vertical = cleanNum(row[16]);
  const broad = cleanNum(row[18]);
  const medBall = cleanNum(row[20]);
  const proAgility = cleanNum(row[22]);
  const situps = cleanNum(row[24]);
  const dash10 = cleanNum(row[26]);
  const dash40 = cleanNum(row[28]);

  /* ---------- CATEGORY AVERAGES ---------- */

  const speedTests = [dash10, dash40].filter(v => v > 0);
  const strengthTests = [bench, squat, situps].filter(v => v > 0);
  const powerTests = [clean].filter(v => v > 0);
  const explosiveTests = [
  vertical,
  broad,
  medBall,
  proAgility // ✅ MOVED HERE
].filter(v => v > 0);

  function avg(arr) {
    return arr.length
  ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length)
  : 0;
  }

  return {
    speed: avg(speedTests),
    strength: avg(strengthTests),
    power: avg(powerTests),
    explosive: avg(explosiveTests)
  };
}




function calculateRankings(playerMetrics) {

  const validRows = ALL_ROWS.filter(r => {
  const name = (r[0] || "").trim();
  return name !== "";
});

const allMetrics = validRows.map(r => extractMetrics(r));

  function getRank(metric) {
    const values = allMetrics.map(m => m[metric]).sort((a,b) => b - a);

    const playerVal = playerMetrics[metric];

    const rank = values.findIndex(v => playerVal >= v) + 1;
    const total = values.length;

    const percentile = Math.round((1 - (rank - 1) / total) * 100);

    return {
      rank,
      total,
      percentile
    };
  }

  return {
  speed: getRank("speed"),
  strength: getRank("strength"),
  power: getRank("power"),
  explosive: getRank("explosive")
};
}



/* ================= LOAD DATA ================= */

Papa.parse(CSV_URL + "&t=" + Date.now(), {
  download: true,
  skipEmptyLines: true,

  complete: function(results) {

    const rows = results.data;

    let athlete = null;

    rows.forEach(row => {
      const name = (row[0] || "").trim().toLowerCase();
      if (name === selectedName) athlete = row;
    });

    if (!athlete) {
      document.getElementById("score").textContent = "No data found";
      return;
    }

    ALL_ROWS = rows;
    CURRENT_ATHLETE = athlete;

    
    const scoreVal = cleanNum(CURRENT_ATHLETE[30]);



    updateComparison(); // 🔥 initial render
  }
});

/* ================= COMPARISON ENGINE ================= */

function updateComparison() {

const player = extractMetrics(CURRENT_ATHLETE);
const dominant = getDominantTrait(player);

const scoreVal = cleanNum(CURRENT_ATHLETE[30]);

document.getElementById("score").innerHTML = `
  <span style="font-size:18px;">Score: ${scoreVal}</span>
  <div style="margin-top:8px; color:#3b82f6; font-weight:600;">
    Dominant: ${dominant.toUpperCase()}
  </div>
`;

let group = [];

/* ===== SELECT GROUP ===== */

if (compareMode === "team") {
group = ALL_ROWS.filter(r => {
const name = (r[0] || "").trim();
return name !== "" && r !== CURRENT_ATHLETE;
});
}

if (compareMode === "top5") {
group = ALL_ROWS
.filter(r => (r[0] || "").trim() !== "")
.sort((a, b) => cleanNum(b[30]) - cleanNum(a[30]))
.filter(r => r !== CURRENT_ATHLETE)
.slice(0, 5);
}

if (compareMode === "weight") {
const weight = cleanNum(CURRENT_ATHLETE[5]);

group = ALL_ROWS.filter(r => {
  const name = (r[0] || "").trim();
  if (!name) return false;

  const w = cleanNum(r[5]);
  return Math.abs(w - weight) <= 10 && r !== CURRENT_ATHLETE;
});

}

/* ===== SAFETY ===== */

if (group.length === 0) {
group = [CURRENT_ATHLETE];
}

/* ===== TOTALS + COUNTS ===== */

let totals = {
speed: 0,
strength: 0,
power: 0,
explosive: 0
};

let counts = {
speed: 0,
strength: 0,
power: 0,
explosive: 0
};

/* ===== LOOP ===== */

group.forEach(r => {
const m = extractMetrics(r);

if (m.speed > 0) {
  totals.speed += m.speed;
  counts.speed++;
}

if (m.strength > 0) {
  totals.strength += m.strength;
  counts.strength++;
}

if (m.power > 0) {
  totals.power += m.power;
  counts.power++;
}

if (m.explosive > 0) {
  totals.explosive += m.explosive;
  counts.explosive++;
}

});

/* ===== AVERAGES ===== */

const avg = {
speed: counts.speed ? totals.speed / counts.speed : 0,
strength: counts.strength ? totals.strength / counts.strength : 0,
power: counts.power ? totals.power / counts.power : 0,
explosive: counts.explosive ? totals.explosive / counts.explosive : 0
};

/* ===== DEBUG ===== */

console.log("PLAYER METRICS:", player);
console.log("AVERAGE METRICS:", avg);

/* ===== RENDER ===== */

renderRadarChart(player, avg);
renderRankings(player);
}

/* ================= TIERS ================= */

function getTier(p) {
if (p >= 99) return "elite";
if (p >= 90) return "strong";
if (p >= 70) return "average";
return "developing";
}

/* ================= RANKING CARDS ================= */

function renderRankings(playerMetrics) {

const ranks = calculateRankings(playerMetrics);
const container = document.getElementById("metrics");

function card(label, data) {
const tier = getTier(data.percentile);

return `
  <div class="card tier-${tier}">
    <h3 class="tier-text-${tier}">${label}</h3>

    <p class="rank">
      #${data.rank} / ${data.total}
    </p>

    <p class="percentile tier-text-${tier}">
      Top ${data.percentile}%
    </p>
  </div>
`;

}

container.innerHTML = `
  ${card("Speed", ranks.speed)}
  ${card("Strength", ranks.strength)}
  ${card("Power", ranks.power)}
  ${card("Explosive", ranks.explosive)}
`;
}

/* ================= HELPERS ================= */

function getDominantTrait(player) {
const entries = Object.entries(player);
entries.sort((a, b) => b[1] - a[1]);
return entries[0][0];
}

function getColor(score) {
if (score >= 900) return "#f97316";
if (score >= 800) return "#22c55e";
if (score >= 700) return "#eab308";
return "#3b82f6";
}

/* ================= CHART ================= */

function renderRadarChart(player, avg) {

  const p = player;
const a = avg;

  const canvas = document.getElementById("radarChart");
const ctx = canvas.getContext("2d");

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 250);
gradient.addColorStop(0, "rgba(59,130,246,0.6)");
gradient.addColorStop(1, "rgba(59,130,246,0.05)");

  if (window.radarChart && typeof window.radarChart.destroy === "function") {
    window.radarChart.destroy();
  }

  window.radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Explosive"],
      datasets: [
  {

    
    label: "Athlete",
    data: [
      p.speed,
            p.strength,
            p.power,
            p.explosive
    ],
    backgroundColor: gradient,
    borderColor: getColor(cleanNum(CURRENT_ATHLETE[30])),
    borderWidth: 3,

pointBorderColor: "#fff",
    pointBackgroundColor: getColor(cleanNum(CURRENT_ATHLETE[30])),
    pointRadius: 5,
    pointHoverRadius: 7
  },
  {
    label: "Comparison",
    data: [
      a.speed,
            a.strength,
            a.power,
            a.explosive
    ],
    borderColor: "#22c55e", // green
  backgroundColor: "rgba(34,197,94,0.15)",
  borderWidth: 2,
  pointRadius: 3
}
]

    },
    options: {
  responsive: true,
  startAngle: -Math.PI / 2, // 🔥 rotates to diamond

animation: {
  duration: 800,
  easing: "easeOutQuart"
},

  plugins: {
    legend: {
      labels: { color: "#ccc" }
    }
  },



  scales: {
    r: {
      beginAtZero: true,
      suggestedMax: 100,

      ticks: { display: false },

      grid: {
        color: "rgba(255,255,255,0.08)"
      },

      angleLines: {
        color: "rgba(255,255,255,0.15)"
      },

      pointLabels: {
        color: "#fff",
        font: {
          size: 14,
          weight: "600"
        }
      },

      
    }
  }
}
  });
}

</script>



</body>
</html>
