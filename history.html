<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athlete Profile</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<main class="section" style="text-align:center;">

  <h1 id="name"></h1>
  <p id="score" style="color: var(--muted); margin-bottom: 20px;"></p>

  <div style="max-width: 500px; margin: auto;">
    <canvas id="radarChart"></canvas>
  </div>

</main>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS81ri1sMtpBVl605PVV_Te2WdA3hVohdXIb1Lc22CrUJSdzXUzGa-0Z0THCtlSa9Wvaa77owi-_BAR/pub?output=csv";

const params = new URLSearchParams(window.location.search);
const selectedName = decodeURIComponent(params.get("name") || "");

document.getElementById("name").textContent = selectedName;

/* ---------- LOAD DATA ---------- */

fetch(CSV_URL + "&t=" + Date.now())
  .then(res => res.text())
  .then(text => {

    const rows = text.trim().split("\n");

    // ✅ Parse headers
    const headers = rows[0].match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)
      .map(h => h.replace(/"/g, "").trim());

    const dataRows = rows.slice(1);

    let athlete = null;

    dataRows.forEach(r => {
      const cols = r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
      if (!cols) return;

      const name = cols[0].replace(/"/g, "").trim();

const cleanSheetName = name.replace(/\s+/g, " ").trim().toLowerCase();
const cleanSelectedName = selectedName.replace(/\s+/g, " ").trim().toLowerCase();

console.log("Comparing:", cleanSheetName, "|", cleanSelectedName);

if (cleanSheetName === cleanSelectedName) {
  athlete = cols;
  console.log("✅ MATCH FOUND:", athlete);
}
    });

    if (!athlete) {
      document.getElementById("score").textContent = "No data found";
      return;
    }

    /* ---------- FIND INDEXES ---------- */

    function getIndex(label) {
      return headers.findIndex(h => h.toLowerCase().includes(label));
    }

    /* ---------- HARD INDEX MAPPING (BASED ON YOUR SHEET) ---------- */

// Column positions (0-based index)
const bench = Number(athlete[6]) || 0;
const squat = Number(athlete[8]) || 0;
const clean = Number(athlete[10]) || 0;
const vertical = Number(athlete[12]) || 0;
const broad = Number(athlete[14]) || 0;
const medBall = Number(athlete[16]) || 0;
const agilityRaw = Number(athlete[18]) || 0;
const situps = Number(athlete[20]) || 0;
const dash10 = Number(athlete[22]) || 0;
const dash40 = Number(athlete[24]) || 0;
const score = Number(athlete[30]) || 0;

/* ---------- BUILD METRICS ---------- */

const strength = bench + squat;
const power = clean + vertical;
const explosiveness = broad + medBall;
const agility = agilityRaw + situps;
const speed = dash10 + dash40;

document.getElementById("score").textContent = `Score: ${score}`;

/* ---------- NORMALIZE ---------- */

function norm(val) {
  return Math.min(val / 5, 100);
}

renderRadarChart(
  norm(speed),
  norm(strength),
  norm(power),
  norm(agility),
  norm(explosiveness)
);

  })
  .catch(err => {
    console.error("FETCH ERROR:", err);
    document.getElementById("score").textContent = "Error loading data";
  });

/* ---------- RADAR CHART ---------- */

function renderRadarChart(speed, strength, power, agility, explosiveness) {

  const ctx = document.getElementById("radarChart");

  new Chart(ctx, {
    type: "radar",
    data: {
      labels: ["Speed", "Strength", "Power", "Agility", "Explosive"],
      datasets: [{
        label: "Performance",
        data: [speed, strength, power, agility, explosiveness],
        fill: true
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: false
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          ticks: {
            display: false
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
