<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Enter Performance</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>
<script src="js/header.js"></script>

<main class="section" style="text-align:center;">

<h1 class="school-name"></h1>
<h2>Enter Athlete Performance</h2>

<div class="form">

<input id="name" placeholder="Last, First (ex: Maxwell, Brent)">

<h3>Strength</h3>
<input id="bench" placeholder="Bench">
<input id="squat" placeholder="Squat">
<input id="situps" placeholder="Sit-ups">

<h3>Power</h3>
<input id="clean" placeholder="Clean">
<input id="medball" placeholder="Med Ball Toss">

<h3>Speed</h3>
<input id="ten" placeholder="10 yd">
<input id="forty" placeholder="40 yd">

<h3>Explosive</h3>
<input id="vertical" placeholder="Vertical">
<input id="broad" placeholder="Broad">
<input id="agility" placeholder="Pro Agility">

<br><br>

<button id="submitBtn">Submit Performance</button>

</div>

<p id="status" style="margin-top:15px;"></p>

</main>

<!-- 🔥 CONFIG -->
<script src="js/themeLoader.js"></script>

<script>

/* ================= WAIT FOR CONFIG ================= */

async function waitForConfig() {
  let attempts = 0;

  while (!window.SCHOOL_CONFIG && attempts < 50) {
    await new Promise(r => setTimeout(r, 50));
    attempts++;
  }

  if (!window.SCHOOL_CONFIG) {
    throw new Error("SCHOOL_CONFIG not ready");
  }
}

/* ================= SUBMIT ================= */

async function submitAthleteData(data) {

  const url = window.SCHOOL_CONFIG.submitURL;

  if (!url) {
    document.getElementById("status").textContent = "❌ No submit URL configured";
    return;
  }

  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams(data)
    });

    document.getElementById("status").textContent = "✅ Submitted successfully!";

    document.querySelectorAll("input").forEach(i => i.value = "");

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent = "❌ Submission failed";
  }
}

/* ================= CLICK HANDLER ================= */

document.getElementById("submitBtn").addEventListener("click", async () => {

  try {
    await waitForConfig();

    const data = {
      name: document.getElementById("name").value,
      bench: document.getElementById("bench").value,
      squat: document.getElementById("squat").value,
      situps: document.getElementById("situps").value,
      clean: document.getElementById("clean").value,
      medball: document.getElementById("medball").value,
      ten: document.getElementById("ten").value,
      forty: document.getElementById("forty").value,
      vertical: document.getElementById("vertical").value,
      broad: document.getElementById("broad").value,
      agility: document.getElementById("agility").value
    };

    submitAthleteData(data);

  } catch (err) {
    console.error(err);
    document.getElementById("status").textContent = "❌ System not ready";
  }

});

</script>

</body>
</html>
