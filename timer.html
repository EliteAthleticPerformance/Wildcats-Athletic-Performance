      /* ===================== STATE ===================== */

let timer = null;

let totalSeconds = 0;
let originalTotalSeconds = 0;

let isRunning = false;
let currentPhase = "idle";
let audioCtx = null;
let lastCountdownSpoken = null;
let phaseJustChanged = false;
let nextTickTime = null;
let workoutData = [];
window.workoutData = workoutData;

/* ===================== SETS ===================== */

let currentSet = 1;
let maxSets = 1;
let rotationCount = 0;
const maxRotations = 4;

/* ===================== PERIOD AUTO START ===================== */

let autoStartEnabled = false;
let mondayTimes = [];
let tueWedTimes = [];
let thuFriTimes = [];
let autoStartTimer = null;
let lastAutoStartMinute = null;
let todayOnlyMode = false;
let forceDateString = null;
let sheetWorkDuration = null;
let sheetRotateDuration = null;
let manualWorkoutOverride = null;

/* ===================== DURATIONS ===================== */

let mondayMinutes = 45;
let tueWedMinutes = 90;
let thuFriMinutes = 90;
let classBlockLength = 90 * 60;

let dressOutDuration = 600;
let dynamicStretchDuration = 600;
let breakDuration = 120;
let cooldownDuration = 0;

/* ===================== FLAGS ===================== */

let dressWarningSpoken = false;

let onBreak = false;
let selectedVoice = null;
let displaySetNumber = 1;

function goFullscreen() {
    document.documentElement.requestFullscreen();
}

/* ======================================================
   START / STOP + TOTAL TIME CALCULATION
====================================================== */

/* ---------- COUNT TOTAL SETS ---------- */
function getTotalSets() {
    return workoutData.filter(item => item.type === "set").length;
}

/* ======================================================
   START TIMER (INITIAL RESET DEFAULTS)
====================================================== */
displaySetNumber = 1;
rotationCount = 0;
currentSet = 1;

function applyDaySpecificClassLength() {
    const now = getEffectiveNow();
    const day = now.getDay(); // 0=Sun

    let minutes = mondayMinutes; // safe default

    if (day === 1) minutes = mondayMinutes;
    else if (day === 2 || day === 3) minutes = tueWedMinutes;
    else if (day === 4 || day === 5) minutes = thuFriMinutes;

    classBlockLength = minutes * 60;

    console.log("📅 Using class length:", minutes, "minutes");
    console.log("📊 Monday minutes:", mondayMinutes);
    console.log("📊 Tue/Wed minutes:", tueWedMinutes);
    console.log("📊 Thu/Fri minutes:", thuFriMinutes);
}

/* ======================================================
   CALCULATE TOTAL CLASS TIME
====================================================== */
function calculateTotalTime() {

    if (!workoutData.length) {
        console.warn("Workout still loading...");
        return;
    }

    const work = parseInt(document.getElementById("workTime").value, 10) || 0;
    const rest = parseInt(document.getElementById("restTime").value, 10) || 0;

    let prepTotal = 0;
    let workoutTotal = 0;
    let breakTotal = 0;

    /* ---------- PREP BLOCKS ---------- */
    prepTotal += dressOutDuration;
    prepTotal += dynamicStretchDuration;

    workoutData.forEach(item => {

        if (item.type === "set") {

            for (let i = 0; i < maxRotations; i++) {
                workoutTotal += work;

                if (i < maxRotations - 1) {
                    workoutTotal += rest;
                }
            }
        }

        if (item.type === "break") {
            breakTotal += item.breakSec || breakDuration;
        }

    });

    /* ---------- TOTAL WORKOUT BEFORE COOLDOWN ---------- */
    const workoutBlock = prepTotal + workoutTotal + breakTotal;

    /* ---------- COOLDOWN CALCULATION ---------- */
    cooldownDuration = Math.max(
        classBlockLength - workoutBlock,
        0
    );

    console.log("Cooldown calculated:", cooldownDuration);

    /* ---------- FINAL TOTAL (ALWAYS CLASS LENGTH) ---------- */
    return classBlockLength;
}

function preciseTick() {

    if (!isRunning) return;

    const now = Date.now();

    if (!nextTickTime) {
        nextTickTime = now + 1000;
    }

    // catch up if browser slept
    while (nextTickTime <= now) {
        tick();
        nextTickTime += 1000;
    }

    const delay = Math.max(0, nextTickTime - now);
    timer = setTimeout(preciseTick, delay);

}

function startTimer() {

    // Safety: require workout
    if (!workoutData.length) {
        console.warn("Workout not loaded yet.");
        return;
    }

    // Initialize audio once
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Toggle stop if already running
    if (isRunning) {
        stopAllTimers();
        return;
    }

    /* ---------- START STATE ---------- */
    isRunning = true;
    applyDaySpecificClassLength();

// ⭐ Force fresh class time calculation
totalSeconds = classBlockLength;
originalTotalSeconds = classBlockLength;
updateTotalDisplay();

document.getElementById("startBtn").innerText = "STOP";

    // FULL RESET
    displaySetNumber = 1;
    rotationCount = 0;
    currentSet = 1;
    dressWarningSpoken = false;
    lastAutoStartMinute = null;

    preloadFirstSet();

    /* ---------- START WITH DRESS PHASE ---------- */
    currentPhase = "dress";
    timeLeft = dressOutDuration;

    const plannedWorkoutTime = calculateTotalTime();

    const classLimit = classBlockLength;
    const finalTotal = Math.min(plannedWorkoutTime, classLimit);

   // Only update preview if workout loaded
// ⭐ Correct total class time
totalSeconds = finalTotal;
originalTotalSeconds = finalTotal;

    updatePhaseDisplay();
    updateClock();
    updateTotalDisplay();

    nextTickTime = Date.now() + 1000;
    timer = setTimeout(preciseTick, 1000);
}

/* ---------- AUTO START ---------- */

function getEffectiveNow() {

    // ⭐ FORCE_DATE override (LOCAL TIME SAFE)
    if (forceDateString) {
        const parts = forceDateString.split(/[T:\-]/);

        if (parts.length >= 6) {
            const forced = new Date(
                Number(parts[0]),     // year
                Number(parts[1]) - 1, // month
                Number(parts[2]),     // day
                Number(parts[3]),     // hour
                Number(parts[4]),     // minute
                Number(parts[5])      // second
            );

            if (!isNaN(forced)) return forced;
        }
    }

    return new Date();
}


function autoDetectActiveClass() {

    if (!autoStartEnabled || isRunning) return;

    const now = getEffectiveNow();
    const day = now.getDay();

    let todaySchedule = [];

    if (day === 1) todaySchedule = mondayTimes;
    else if (day === 2 || day === 3) todaySchedule = tueWedTimes;
    else if (day === 4 || day === 5) todaySchedule = thuFriTimes;

    for (const timeStr of todaySchedule) {

        const [h, m] = timeStr.split(":").map(Number);

        const start = new Date(now);
        start.setHours(h, m, 0, 0);

        const end = new Date(start.getTime() + classBlockLength * 1000);

        if (now >= start && now < end) {

            console.log("⚡ Class already in progress. Auto syncing timer.");

            startTimer();

            const elapsed = Math.floor((now - start) / 1000);

            totalSeconds = Math.max(classBlockLength - elapsed, 1);
            originalTotalSeconds = totalSeconds;

            updateTotalDisplay();

            break;
        }
    }
}


function startAutoScheduler() {

        if (autoStartTimer) {
        clearInterval(autoStartTimer);
    }

    autoStartTimer = setInterval(() => {

        if (!autoStartEnabled) return;

        const now = getEffectiveNow();
        const day = now.getDay(); // 0=Sun, 1=Mon...

        if (todayOnlyMode) {
            // Only allow today's schedule
            const today = now.getDay();
            if (today === 0 || today === 6) return; // block weekends
        }

        if (isRunning) return;

        let todaySchedule = [];

        if (day === 1) todaySchedule = mondayTimes;
        else if (day === 2 || day === 3) todaySchedule = tueWedTimes;
        else if (day === 4 || day === 5) todaySchedule = thuFriTimes;
        else return; // weekend

        for (const timeStr of todaySchedule) {

            const parts = timeStr.split(":");
            if (parts.length !== 2) continue;

            const targetHour = parseInt(parts[0], 10);
            const targetMinute = parseInt(parts[1], 10);

            if (isNaN(targetHour) || isNaN(targetMinute)) continue;

            const currentTotalSeconds =
                now.getHours() * 3600 +
                now.getMinutes() * 60 +
                now.getSeconds();

            const targetTotalSeconds =
                targetHour * 3600 +
                targetMinute * 60;

            // start within first 5 seconds of the minute
            const currentMinuteStamp =
                String(now.getHours()).padStart(2, "0") + ":" +
                String(now.getMinutes()).padStart(2, "0");

            if (
                currentTotalSeconds >= targetTotalSeconds &&
                currentTotalSeconds < targetTotalSeconds + 5 &&
                lastAutoStartMinute !== currentMinuteStamp
            ) {
                lastAutoStartMinute = currentMinuteStamp;

                console.log("🔔 Auto starting:", timeStr);
                startTimer();
                break;
            }
        }

    }, 1000);
}

/* ======================================================
   ROBUST CSV PARSER
====================================================== */
function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        // escaped quote
        if (char === '"' && inQuotes && next === '"') {
            cell += '"';
            i++;
            continue;
        }

        // toggle quotes
        if (char === '"') {
            inQuotes = !inQuotes;
            continue;
        }

        // comma separator
        if (char === "," && !inQuotes) {
            row.push(cell);
            cell = "";
            continue;
        }

        // row break
        if ((char === "\n" || char === "\r") && !inQuotes) {
            if (cell !== "" || row.length) {
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
            continue;
        }

        cell += char;
    }

    if (cell !== "" || row.length) {
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

/* ======================================================
   SAFE NUMBER PARSER
====================================================== */
function parseSheetNumber(val, fallback = null) {
    if (val === undefined || val === null) return fallback;

    const cleaned = String(val)
        .replace(/\r/g, "")
        .trim();

    if (!cleaned) return fallback;

    const num = Number(cleaned);
    return isNaN(num) ? fallback : num;
}

/* ======================================================
   MAIN LOADER
====================================================== */

function isEffectivelyBlankRow(row) {
    if (!row || row.length === 0) return true;

    return row.every(cell =>
        String(cell ?? "")
            .replace(/\u00A0/g, "") // non-breaking space
            .replace(/\s/g, "")
            .trim() === ""
    );
}

/* ======================================================
   GET NEXT SET INDEX (1-BASED)
====================================================== */
function getNextSetIndex() {

    // Start searching AFTER currentSet
    for (let i = currentSet; i < workoutData.length; i++) {
        if (workoutData[i].type === "set") {
            return i + 1; // convert to 1-based index
        }
    }

    // No more sets found
    return null;
}

/* ======================================================
   WORK DURATION (seconds)
====================================================== */
function getWorkDuration() {

    const currentItem = workoutData[currentSet - 1];

    // 1️⃣ per-set override
    if (currentItem?.workSec) {
        console.log("⏱ Work time (set override):", {
            set: currentSet,
            value: currentItem.workSec
        });
        return currentItem.workSec;
    }

    // 2️⃣ sheet global override
    if (sheetWorkDuration) {
        console.log("⏱ Work time (sheet global):", sheetWorkDuration);
        return sheetWorkDuration;
    }

    // 3️⃣ UI fallback
    const val = parseInt(document.getElementById("workTime").value, 10);
    const safeVal = isNaN(val) || val <= 0 ? 1 : val;

    console.log("⏱ Work time (UI fallback):", safeVal);

    return safeVal;
}

/* ======================================================
   MAIN TICK
====================================================== */

function tick() {

    if (!isRunning) return;

    phaseJustChanged = false;

    /* ======================================================
       1️⃣ MASTER CLASS TIMER (authoritative)
    ====================================================== */
    if (totalSeconds <= 0) {
        workoutFinishScreen();
        return;
    }

    totalSeconds = Math.max(0, totalSeconds - 1);
    updateTotalDisplay();

    /* ======================================================
       2️⃣ PHASE TIMER
    ====================================================== */
    timeLeft = Math.max(0, timeLeft - 1);

    /* ======================================================
       3️⃣ DRESS WARNING (exact trigger)
    ====================================================== */
    if (
        currentPhase === "dress" &&
        timeLeft === 120 &&
        !dressWarningSpoken
    ) {
        speakDressWarning();
        dressWarningSpoken = true;
    }

    /* ======================================================
       4️⃣ FINAL COUNTDOWN (no repeats)
    ====================================================== */
    if (timeLeft >= 1 && timeLeft <= 3) {
        if (lastCountdownSpoken !== timeLeft) {
            speakNumber(timeLeft);
            lastCountdownSpoken = timeLeft;
        }
    }

    /* ======================================================
       5️⃣ UPDATE CLOCK
    ====================================================== */
    updateClock();

    /* ======================================================
       6️⃣ EXIT IF TIME REMAINS
    ====================================================== */
    if (timeLeft > 0) return;

    lastCountdownSpoken = null;

    console.log("Set:", currentSet, "Rotation:", rotationCount);

    /* ======================================================
       PHASE TRANSITIONS (STATE MACHINE)
    ====================================================== */
    switch (currentPhase) {

        case "dress":
            currentPhase = "stretch";
            timeLeft = dynamicStretchDuration;
            dressWarningSpoken = false;
            phaseJustChanged = true;
            speakStretch();
            break;

        case "stretch":
            currentPhase = "work";
            rotationCount = 0;
            currentSet = 1;
            displaySetNumber = 1;

            loadSetData(1);

            timeLeft = getWorkDuration();
            phaseJustChanged = true;
            speakLift();
            break;

        case "work": {
            rotateQuadrants();
            rotationCount++;

            currentPhase = "rotate";
            timeLeft = getRestDuration();
            phaseJustChanged = true;
            speakRotate();
            break;
        }

        /* ---------- ROTATE → NEXT ---------- */
        case "rotate": {

    const finishedRotations = rotationCount >= maxRotations;

    if (finishedRotations) {

        rotationCount = 0;

        const nextItem = workoutData[currentSet]; // look ahead

        // 🔴 no more items
        if (!nextItem) {
            workoutComplete();
            return;
        }


        // 🟡 break row
        if (nextItem.type === "break") {


            // advance pointer onto the break row
            currentSet++;

            currentPhase = "break";

            timeLeft = Math.max(
                1,
                nextItem.breakSec || breakDuration
            );


            phaseJustChanged = true;
            speakBreakPrep();

            previewNextSet();
            break;
        }


        // ✅ next is real set
        currentSet++;
        displaySetNumber++;
        loadSetData(currentSet);
    }

    currentPhase = "work";
    timeLeft = getWorkDuration();
    phaseJustChanged = true;
    speakLift();
    break;
}

        case "break": {

            const nextItem = workoutData[currentSet];

            if (!nextItem) {
                workoutComplete();
                return;
            }

            // ✅ ONLY advance when next is a set
            if (nextItem.type === "set") {
                currentSet++;
                displaySetNumber++;
                loadSetData(currentSet);
            }

            currentPhase = "work";
            timeLeft = getWorkDuration();
            phaseJustChanged = true;
            speakLift();
            break;
        }

    } // ✅ CLOSES switch(currentPhase)

    /* ======================================================
       FINAL UI UPDATE
    ====================================================== */
    if (phaseJustChanged) {
        updatePhaseDisplay();
    }
}

/* -------------------- ROTATE QUADRANTS -------------------- */
function rotateQuadrants() {

    const mapping = {
        q1: "q2",
        q2: "q4",
        q4: "q3",
        q3: "q1"
    };

    const colors = {};
    const textColors = {};

    for (let id in mapping) {
        const el = document.getElementById(id);
        colors[id] = window.getComputedStyle(el).backgroundColor;
        textColors[id] = window.getComputedStyle(el).color;
    }

    for (let id in mapping) {
        const target = mapping[id];
        document.getElementById(target).style.backgroundColor = colors[id];
        document.getElementById(target).style.color = textColors[id];
    }
}

/* ======================================================
   AUDIO CORE
====================================================== */

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }
}

/* ---------- GENERIC TONE ---------- */
function playTone(freq, dur) {

    ensureAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = freq;

    // 🔥 prevent speaker clipping
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + dur
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

/* ---------- AIR HORN ---------- */
function playHorn() {

    ensureAudio();

    const duration = 2.5;

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = "sawtooth";
    osc2.type = "square";

    osc1.frequency.value = 180;
    osc2.frequency.value = 220;

    // 🔥 cleaner envelope (less pop)
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.9, audioCtx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start();
    osc2.start();

    osc1.stop(audioCtx.currentTime + duration);
    osc2.stop(audioCtx.currentTime + duration);
}

/* ======================================================
   SPEECH ENGINE (shared helper)
====================================================== */

function speak(text, rate = 1, pitch = 1) {

    // Prevent queue pile-up
    speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);

    if (selectedVoice) utter.voice = selectedVoice;

    utter.volume = 1;
    utter.rate = rate;
    utter.pitch = pitch;

    speechSynthesis.speak(utter);
}

====================================================== */

function loadSetData(setNumber) {

    const workout = workoutData[setNumber - 1];

    if (!workout || workout.type !== "set") return;

    /* ---------- CORE ---------- */
    const q1Texts = document.querySelectorAll("#q1 .quad-text");
    if (q1Texts.length >= 3) {
        q1Texts[0].innerText = workout.core;
        q1Texts[1].innerText = "Reps: " + workout.reps;
        q1Texts[2].innerText =
            "Percentage: " + (workout.percent ? workout.percent + "%" : "");
    }

    /* ---------- AUX ---------- */
    const q2Texts = document.querySelectorAll("#q2 .quad-text");
    if (q2Texts.length >= 2) {
        q2Texts[0].innerText = workout.aux;
        q2Texts[1].innerText = "Reps: " + workout.auxReps;
    }

    /* ---------- MOVEMENT ---------- */
    const q4Texts = document.querySelectorAll("#q4 .quad-text");
    if (q4Texts.length >= 2) {
        q4Texts[0].innerText = workout.move;
        q4Texts[1].innerText = "Reps/Time: " + workout.moveReps;
    }
}
