<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const school = params.get("school") || sessionStorage.getItem("school") || "harrisonville";
  sessionStorage.setItem("school", school);

  let logo = null;
  let config = null;

  try {
    const rawLogo = sessionStorage.getItem("logo-" + school);
    logo = rawLogo ? JSON.parse(rawLogo) : null;
  } catch (e) {
    console.warn("Logo parse failed:", e);
  }

  try {
    const rawTheme = sessionStorage.getItem("theme-" + school);
    config = rawTheme ? JSON.parse(rawTheme) : null;
  } catch (e) {
    console.warn("School name parse failed:", e);
  }

      // 👇 ADD THIS LINE RIGHT HERE
globalTheme = config;

  document.addEventListener("DOMContentLoaded", () => {

    // ✅ Set logo
    const logoEl = document.getElementById("schoolLogo");
    if (logoEl && logo) {
      logoEl.src = logo;
    }

    // ✅ Set school name
    const nameEl = document.getElementById("schoolName");
    if (nameEl && config?.name) {
      nameEl.innerText = config.name;
    }

    // 🔥 AUTO-FIT
    function fitSchoolName() {
      const el = document.getElementById("schoolName");
      if (!el) return;

      let size = 42;
      el.style.fontSize = size + "px";

      const maxWidth = window.innerWidth * 0.8;

      while (el.scrollWidth > maxWidth && size > 14) {
        size -= 1;
        el.style.fontSize = size + "px";
      }
    }

    // 🔥 DYNAMIC GLOW
    function applySchoolGlow(theme) {
      const el = document.getElementById("schoolName");
      if (!el || !theme) return;

      el.style.textShadow = `
        0 0 6px ${theme.primary},
        0 0 14px ${theme.primaryLight},
        0 0 22px ${theme.primary}
      `;
    }

    // ✅ RUN AFTER DOM READY
    fitSchoolName();
    applySchoolGlow(config);

    // 🔁 resize support
    window.addEventListener("resize", fitSchoolName);

  });

})();
</script>

<script>

  

      /* ===================== STATE ===================== */

let timer = null;
let timeLeft = 0;
let totalSeconds = 0;
let originalTotalSeconds = 0;
let classBlockLength = 3600; // default = 60 minutes
let isRunning = false;
let currentPhase = "idle";
let audioCtx = null;
let lastCountdownSpoken = null;
let phaseJustChanged = false;
let nextTickTime = null;
let workoutData = [];
window.workoutData = workoutData;
window.classStartTime = null;
let phaseStartTime = null;
      let globalTheme = null;
      

/* ===================== SETS ===================== */

let currentSet = 1;
let maxSets = 1;
let rotationCount = 0;
const maxRotations = 4;

/* ===================== PERIOD AUTO START ===================== */

window.autoStartEnabled = true;
window.monTimes = [];
window.tueTimes = [];
window.wedTimes = [];
window.thuTimes = [];
window.friTimes = [];
let autoStartTimer = null;
let lastAutoStartMinute = null;
let todayOnlyMode = false;
let forceDateString = null;
let sheetWorkDuration = null;
let sheetRotateDuration = null;
let manualWorkoutOverride = null;
let lastControlSignature = null;
      

/* ===================== DURATIONS ===================== */

let dressOutDuration = 600;
let dynamicStretchDuration = 600;
let breakDuration = 120;
let cooldownDuration = 0;

/* ===================== FLAGS ===================== */

let dressWarningSpoken = false;

let onBreak = false;
let selectedVoice = null;
let displaySetNumber = 1;

function goFullscreen() {
    document.documentElement.requestFullscreen();
}

/* ======================================================
   START / STOP + TOTAL TIME CALCULATION
====================================================== */

function safeGet(id, fallback = 0) {
    const el = document.getElementById(id);
    return el ? parseInt(el.value, 10) || fallback : fallback;
}

function updateClock() {
    const el = document.getElementById("clock"); // ✅ FIXED

    if (!el) return;

    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;

    el.textContent =
        minutes + ":" + String(seconds).padStart(2, "0");
}

      function updatePhaseDisplay() {
    const el = document.getElementById("phase");
    if (!el) return;

    const newText = currentPhase.toUpperCase();

    // prevent re-animation if same phase
    if (el.textContent === newText) return;

    el.classList.remove("phase-active", "phase-work");
    el.classList.add("phase-enter");

    setTimeout(() => {
        el.textContent = newText;

        el.classList.remove("phase-enter");
        el.classList.add("phase-active");

        if (currentPhase === "work") {
            el.classList.add("phase-work");
        }

    }, 150);
}

      function updateCenterVisuals() {
    const center = document.getElementById("centerInner");
    if (!center) return;

    // reset classes
    center.classList.remove(
        "phase-dress",
        "phase-stretch",
        "phase-work",
        "phase-rotate",
        "phase-break",
        "phase-cooldown"
    );

    // apply current phase
    center.classList.add(`phase-${currentPhase}`);
}

      function updateUrgencyEffects() {
    const center = document.getElementById("centerInner");

    if (!center) return;

    // remove first
    center.classList.remove("urgent");

    if (timeLeft <= 5 && currentPhase === "work") {
        center.classList.add("urgent");
    }
}

      function updateClockPulse() {

    const centerInner = document.getElementById("centerInner");

    if (!centerInner) return;

    centerInner.classList.remove("pulse");

    if (timeLeft <= 5 && currentPhase === "work") {
        centerInner.classList.add("pulse");
    }
}
      
/* ---------- COUNT TOTAL SETS ---------- */
function getTotalSets() {
    return workoutData.filter(item => item.type === "set").length;
}

/* ======================================================
   START TIMER (INITIAL RESET DEFAULTS)
====================================================== */
displaySetNumber = 1;
rotationCount = 0;
      applyRotationState(rotationCount);
currentSet = 1;



/* ======================================================
   CALCULATE TOTAL CLASS TIME
====================================================== */
function calculateTotalTime() {

    if (!workoutData.length) {
        console.warn("Workout still loading...");
        return;
    }

    const work = sheetWorkDuration ?? safeGet("workTime", 30);
const rest = sheetRotateDuration ?? safeGet("restTime", 10);

    let prepTotal = 0;
    let workoutTotal = 0;
    let breakTotal = 0;

    /* ---------- PREP BLOCKS ---------- */
    prepTotal += dressOutDuration;
    prepTotal += dynamicStretchDuration;

    workoutData.forEach(item => {

        if (item.type === "set") {

            for (let i = 0; i < maxRotations; i++) {
                workoutTotal += work;

                if (i < maxRotations - 1) {
                    workoutTotal += rest;
                }
            }
        }

        if (item.type === "break") {
            breakTotal += item.breakSec || breakDuration;
        }

    });

    /* ---------- TOTAL WORKOUT BEFORE COOLDOWN ---------- */
    const workoutBlock = prepTotal + workoutTotal + breakTotal;

   /* ---------- FINAL TOTAL ---------- */

const total =
    workoutBlock + cooldownDuration;

console.log("🧮 Total workout time:", total);

return total;
}
      

function preciseTick() {

    if (!isRunning) return;

    const now = Date.now();

    if (!nextTickTime) {
        nextTickTime = now + 1000;
    }

    // catch up if browser slept
    while (nextTickTime <= now) {
        tick();
        nextTickTime += 1000;
    }

    const delay = Math.max(0, nextTickTime - now);
    timer = setTimeout(preciseTick, delay);

      
}

function startTimer() {

    // Safety: require workout
    if (!workoutData.length) {
        console.warn("Workout not loaded yet.");
        return;
    }

    // Initialize audio once
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Toggle stop if already running
    if (isRunning) {
        stopAllTimers();
        return;
    }

    /* ---------- START STATE ---------- */
    isRunning = true;
      window.classStartTime = getEffectiveNow().getTime();
    

// ⭐ Force fresh class time calculation
totalSeconds = classBlockLength;
originalTotalSeconds = classBlockLength;
updateTotalDisplay();

document.getElementById("startBtn").innerText = "STOP";

    // FULL RESET
    displaySetNumber = 1;
    rotationCount = 0;
      applyRotationState(rotationCount);
    currentSet = 1;
    dressWarningSpoken = false;
    lastAutoStartMinute = null;

    preloadFirstSet();

    /* ---------- START WITH DRESS PHASE ---------- */
    currentPhase = "dress";
    timeLeft = dressOutDuration;

    const plannedWorkoutTime = calculateTotalTime();

    const classLimit = classBlockLength;
    const finalTotal = Math.min(plannedWorkoutTime, classLimit);

   // Only update preview if workout loaded
// ⭐ Correct total class time
totalSeconds = finalTotal;
originalTotalSeconds = finalTotal;

    
    updateClock();
    updateTotalDisplay();
      updateSegmentHighlight();

    nextTickTime = Date.now() + 1000;
    timer = setTimeout(preciseTick, 1000);

      if (!window.timelineAnimating) {
    window.timelineAnimating = true;
    animateTimeline();
}
}

/* ---------- AUTO START ---------- */

function getEffectiveNow() {

    // ⭐ FORCE_DATE override (LOCAL TIME SAFE)
    if (forceDateString) {

      function computeWorkoutState(nowMs) {

    const startTime = window.classStartTime;
    if (!startTime) return null;

    let elapsed = Math.floor((nowMs - startTime) / 1000);

    /* ===================== DRESS ===================== */
    if (elapsed < dressOutDuration) {
        return {
            phase: "dress",
            timeLeft: Math.max(dressOutDuration - elapsed, 0),
            originalDuration: dressOutDuration
        };
    }

    elapsed -= dressOutDuration;

    /* ===================== STRETCH ===================== */
    if (elapsed < dynamicStretchDuration) {
        return {
            phase: "stretch",
            timeLeft: Math.max(dynamicStretchDuration - elapsed, 0),
            originalDuration: dynamicStretchDuration
        };
    }

    elapsed -= dynamicStretchDuration;

    /* ===================== WORK / ROTATIONS ===================== */

    let setIndex = 0;

    while (setIndex < workoutData.length) {

        const item = workoutData[setIndex];

        /* ---------- BREAK ---------- */
        if (item.type === "break") {

            const breakTime = item.breakSec || breakDuration;

            if (elapsed < breakTime) {
                return {
                    phase: "break",
                    timeLeft: Math.max(breakTime - elapsed, 0),
                    originalDuration: breakTime
                };
            }

            elapsed -= breakTime;
            setIndex++;
            continue;
        }

        /* ---------- SET ---------- */
        if (item.type === "set") {

            const workTime = item.workSec || sheetWorkDuration || safeGet("workTime", 30);
            const rotateTime = item.rotateSec || sheetRotateDuration || safeGet("restTime", 10);

            for (let rotation = 0; rotation < maxRotations; rotation++) {

                // 🟥 WORK
                if (elapsed < workTime) {
                    return {
                        phase: "work",
                        timeLeft: Math.max(workTime - elapsed, 0),
                        originalDuration: workTime,
                        setIndex: setIndex + 1,
                        setNumber: setIndex + 1,
                        rotation: rotation
                    };
                }

                elapsed -= workTime;

                // 🟪 ROTATE
                if (rotation < maxRotations - 1) {
                    if (elapsed < rotateTime) {
                        return {
                            phase: "rotate",
                            timeLeft: Math.max(rotateTime - elapsed, 0),
                            originalDuration: rotateTime,
                            setIndex: setIndex + 1,
                            setNumber: setIndex + 1,
                            rotation: rotation
                        };
                    }

                    elapsed -= rotateTime;
                }
            }

            setIndex++;
        }
    }

    /* ===================== COOLDOWN ===================== */
if (elapsed < cooldownDuration) {
    return {
        phase: "cooldown",
        timeLeft: Math.max(cooldownDuration - elapsed, 0),
        originalDuration: cooldownDuration
    };
}

elapsed -= cooldownDuration;

/* ===================== DONE ===================== */
return {
    phase: "done",
    timeLeft: 0,
    originalDuration: 0
};
      }

/* ======================================================
   ROBUST CSV PARSER
====================================================== */
function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        // escaped quote
        if (char === '"' && inQuotes && next === '"') {
            cell += '"';
            i++;
            continue;
        }

        // toggle quotes
        if (char === '"') {
            inQuotes = !inQuotes;
            continue;
        }

        // comma separator
        if (char === "," && !inQuotes) {
            row.push(cell);
            cell = "";
            continue;
        }

        // row break
        if ((char === "\n" || char === "\r") && !inQuotes) {
            if (cell !== "" || row.length) {
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
            continue;
        }

        cell += char;
    }

    if (cell !== "" || row.length) {
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

/* ======================================================
   SAFE NUMBER PARSER
====================================================== */
function parseSheetNumber(val, fallback = null) {
    if (val === undefined || val === null) return fallback;

    const cleaned = String(val)
        .replace(/\r/g, "")
        .trim();

    if (!cleaned) return fallback;

    const num = Number(cleaned);
    return isNaN(num) ? fallback : num;
}

/* ======================================================
   MAIN LOADER
====================================================== */

function isEffectivelyBlankRow(row) {
    if (!row || row.length === 0) return true;

    return row.every(cell =>
        String(cell ?? "")
            .replace(/\u00A0/g, "") // non-breaking space
            .replace(/\s/g, "")
            .trim() === ""
    );
}

            el.style.textShadow = `
                0 0 6px orange,
                0 0 14px gold
            `;
            break;

        case "break":
            el.style.textShadow = `
                0 0 6px red,
                0 0 16px crimson
            `;
            break;

        case "cooldown":
            el.style.textShadow = `
                0 0 4px #888,
                0 0 10px #555
            `;
            break;
    }
}

function updateSegmentHighlight() {

    if (!window.classStartTime) return;

    /* ===================== TRUE ELAPSED ===================== */

const totalTimelineDuration = timelineData.reduce(
    (sum, seg) => sum + seg.duration,
    0
);

let elapsed =
    totalTimelineDuration - totalSeconds;

    let currentIndex = 0;
    let segmentElapsed = 0;

    // find current segment
    for (let i = 0; i < timelineData.length; i++) {

        const segDuration = timelineData[i].duration;

        if (elapsed < segDuration) {
            currentIndex = i;
            segmentElapsed = elapsed;
            break;
        }

        elapsed -= segDuration;
    }

    const segments = document.querySelectorAll(".timeline-segment");

    segments.forEach((el, i) => {

        const fill = el.querySelector(".segment-fill");

        if (!fill) return;

        // ACTIVE segment
        if (i === currentIndex) {

            el.classList.add("active");

            const segDuration = timelineData[i].duration;
            const percent = Math.min((segmentElapsed / segDuration) * 100, 100);

            fill.style.transition = "width 0.3s linear";
fill.style.width = percent + "%";
        }

        // COMPLETED segments
        else if (i < currentIndex) {
            el.classList.remove("active");
            fill.style.width = "100%";
        }

        // FUTURE segments
        else {
            el.classList.remove("active");
            fill.style.width = "0%";
        }
    });
}

function animateTimeline() {
    updateSegmentHighlight();
    requestAnimationFrame(animateTimeline);
}
      
function applyCoachControl() {

  if (!window.classStartTime && window.controlTimestamp) {
    window.classStartTime = new Date(window.controlTimestamp).getTime();
}

  // 🔥 FORCE SYNC FOR LATE JOIN (even without new START command)
if (window.classStartTime && isRunning) {
    const now = getEffectiveNow().getTime();
    const state = computeWorkoutState(now);

    if (state) {
        currentPhase = state.phase;
        timeLeft = state.timeLeft;

        if (state.setIndex !== undefined) {
            currentSet = state.setIndex;
            displaySetNumber = state.setNumber;
            loadSetData(currentSet);
        }

        rotationCount = state.rotation || 0;
          applyRotationState(rotationCount);
          

        updateClock();
        
        updateTotalDisplay();
    }
}

    if (!window.controlAction) return;

    const signature = [
        window.controlAction,
        window.controlTimestamp,
        window.controlPhase,
        window.controlSet,
        window.controlRotation
    ].join("|");

    // 🚫 prevent re-running same command
    if (signature === lastControlSignature) return;

    lastControlSignature = signature;

    const now = getEffectiveNow().getTime();

    console.log("🎮 Applying control:", signature);

    switch (window.controlAction) {

       case "START":
    window.classStartTime = new Date(window.controlTimestamp).getTime();
    isRunning = true;

    // 🔥 FIXED — DEFINE nowMs FIRST
    const nowMs = getEffectiveNow().getTime();
    const state = computeWorkoutState(nowMs);

    if (!state) return;

    // 🔥 ROTATE CHECK (optional but good)
    if (
    state.phase === "rotate" &&
    state.rotation !== rotationCount
) {
    console.log("🔁 ROTATING QUADRANTS (COACH SYNC)");

    rotationCount = state.rotation;

    applyRotationState(rotationCount);
}

    currentPhase = state.phase;
    timeLeft = state.timeLeft;

    rotationCount = state.rotation || 0;

    updateClock();
    
    updateTotalDisplay();
break;

        case "STOP":
    stopAllTimers();
    window.classStartTime = null;
        
updateClock();
updateTotalDisplay();
    break;

        case "PAUSE":
            isRunning = false;
        
updateClock();
updateTotalDisplay();
            break;

        case "RESUME":
            isRunning = true;
        
updateClock();
updateTotalDisplay();
            break;

        case "JUMP":

            const offset = calculateOffsetForTarget(
                window.controlPhase,
                window.controlSet,
                window.controlRotation
            );

            window.classStartTime = now - (offset * 1000);
        
updateClock();
updateTotalDisplay();
            break;
    }
} 

      

/* ======================================================
   TOTAL DISPLAY
====================================================== */
function updateTotalDisplay() {

    // Prevent negative time showing
    const safeTotal = Math.max(0, totalSeconds);

    const minutes = Math.floor(safeTotal / 60);
    const seconds = safeTotal % 60;

    const totalEl = document.getElementById("totalTime");
    if (!totalEl) return;

    totalEl.innerText =
        `${minutes.toString().padStart(2, "0")}:` +
        `${seconds.toString().padStart(2, "0")}`;
}

/* ======================================================
   DETERMINISTIC QUADRANT ROTATION
====================================================== */

function applyRotationState(rotation) {

    const q1 = document.getElementById("q1");
    const q2 = document.getElementById("q2");
    const q3 = document.getElementById("q3");
    const q4 = document.getElementById("q4");

    if (!q1 || !q2 || !q3 || !q4) return;

    const base = {

        q1: {
            bg: "#000",
            color: "#fff"
        },

        q2: {
            bg: "#f4f4f4",
            color: "#000"
        },

        q3: {
            bg: "var(--primary)",
            color: "#fff"
        },

        q4: {
            bg: "#555",
            color: "#fff"
        }
    };

    const layouts = [

        // ROTATION 0
        {
            q1: base.q1,
            q2: base.q2,
            q3: base.q3,
            q4: base.q4
        },

        // ROTATION 1
        {
            q1: base.q3,
            q2: base.q1,
            q3: base.q4,
            q4: base.q2
        },

        // ROTATION 2
        {
            q1: base.q4,
            q2: base.q3,
            q3: base.q2,
            q4: base.q1
        },

        // ROTATION 3
        {
            q1: base.q2,
            q2: base.q4,
            q3: base.q1,
            q4: base.q3
        }
    ];

    const layout = layouts[rotation % 4];

    Object.keys(layout).forEach(id => {

        const el = document.getElementById(id);

        if (!el) return;

        el.style.background = layout[id].bg;
        el.style.color = layout[id].color;
    });
}

/* ======================================================
   AUDIO CORE
====================================================== */

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }
}

/* ---------- GENERIC TONE ---------- */
function playTone(freq, dur) {

    ensureAudio();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = freq;

    // 🔥 prevent speaker clipping
    gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + dur
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

/* ---------- AIR HORN ---------- */
function playHorn() {

    ensureAudio();

    const duration = 2.5;

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.type = "sawtooth";
    osc2.type = "square";

    osc1.frequency.value = 180;
    osc2.frequency.value = 220;

    // 🔥 cleaner envelope (less pop)
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.9, audioCtx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start();
    osc2.start();

    osc1.stop(audioCtx.currentTime + duration);
    osc2.stop(audioCtx.currentTime + duration);
}

/* ======================================================
   SPEECH ENGINE (shared helper)
====================================================== */

function speak(text, rate = 1, pitch = 1) {

    // Prevent queue pile-up
    speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);

    if (selectedVoice) utter.voice = selectedVoice;

    utter.volume = 1;
    utter.rate = rate;
    utter.pitch = pitch;

    speechSynthesis.speak(utter);
}

/* ---------- COUNTDOWN ---------- */
function speakNumber(num) {
    speak(num.toString(), 1, 1);
}

/* ---------- ROTATE ---------- */
function speakRotate() {
    speak("Rotate!", 1.6, 1.5);
}

/* ---------- DRESS WARNING ---------- */
function speakDressWarning() {
    speak("Two minute warning", 1, 1);
}

/* ---------- LIFT ---------- */
function speakLift() {
    speak("Lift!", 1.6, 1.3);
}

/* ---------- STRETCH ---------- */
function speakStretch() {
    speak("Dynamic Stretch!", 1.3, 1.2);
}

/* ---------- BREAK PREP ---------- */
function speakBreakPrep() {
    speak("Break! Prep next lift!", 1.2, 1.1);
}

/* ======================================================
   REST DURATION (seconds)
====================================================== */
function getRestDuration() {

    // 1️⃣ per-set override
    const currentItem = workoutData[currentSet - 1];
    if (currentItem?.rotateSec) {
        console.log("⏱ Using per-set rotate:", currentItem.rotateSec);
        return currentItem.rotateSec;
    }

    // 2️⃣ sheet override
    if (sheetRotateDuration !== null) {
        console.log("⏱ Using sheet rotate:", sheetRotateDuration);
        return sheetRotateDuration;
    }

    // 3️⃣ UI fallback
    const val = parseInt(document.getElementById("restTime").value, 10);
    const safe = isNaN(val) || val <= 0 ? 1 : val;

    console.log("⏱ Using UI rotate:", safe);
    return safe;
}

function syncTime() {

    if (!isRunning) {

        const workVal = getWorkDuration();
        const restVal = getRestDuration();

        timeLeft = (currentPhase === "work") ? workVal : restVal;

        updateClock();

        }
}

/* ======================================================
   RESET CENTER CLOCK
====================================================== */

function resetCenterClock() {

    const center = document.getElementById("center");

    center.classList.remove("workMode", "rotateMode");
    center.classList.add("workMode");

    document.getElementById("clock").innerText =
        document.getElementById("workTime").value;

    document.getElementById("phase").innerText = "WORK";
}

/* ======================================================
   LOAD SET INTO QUADRANTS
====================================================== */

function loadSetData(setNumber) {

    const workout = workoutData[setNumber - 1];

    if (!workout || workout.type !== "set") return;

    /* ---------- CORE ---------- */
    const q1Texts = document.querySelectorAll("#q1 .quad-text");
    if (q1Texts.length >= 3) {
        q1Texts[0].innerText = workout.core;
        q1Texts[1].innerText = "Reps: " + workout.reps;
        q1Texts[2].innerText =
            "Percentage: " + (workout.percent ? workout.percent + "%" : "");
    }

    /* ---------- AUX ---------- */
    const q2Texts = document.querySelectorAll("#q2 .quad-text");
    if (q2Texts.length >= 2) {
        q2Texts[0].innerText = workout.aux;
        q2Texts[1].innerText = "Reps: " + workout.auxReps;
    }

    /* ---------- MOVEMENT ---------- */
    const q4Texts = document.querySelectorAll("#q4 .quad-text");
    if (q4Texts.length >= 2) {
        q4Texts[0].innerText = workout.move;
        q4Texts[1].innerText = "Reps/Time: " + workout.moveReps;
    }
}

      function workoutFinishScreen() {
    isRunning = false;

    // stop timer loop
    if (timer) clearTimeout(timer);

    // update center display
    const clock = document.getElementById("clock");
    const phase = document.getElementById("phase");

    if (clock) clock.textContent = "0:00";
    if (phase) phase.textContent = "COMPLETE";

    // visual style
    const center = document.getElementById("center");
    if (center) {
        center.classList.remove(
            "phase-dress",
            "phase-stretch",
            "phase-work",
            "phase-rotate",
            "phase-break"
        );
        center.classList.add("phase-cooldown");
    }

    console.log("🏁 Workout finished");
}
