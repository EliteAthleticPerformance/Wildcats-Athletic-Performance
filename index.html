<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wildcats Performance System</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- ===== HERO ===== -->
  <section class="section" style="text-align:center;">
    <h1 class="hero-title">Track. Compete. Improve.</h1>
    <p style="color: var(--muted); margin-top:10px;">
      Elite Athlete Performance Tracking System
    </p>
  </section>

  <!-- ===== PRIMARY ACTION ===== -->
  <section class="section" style="text-align:center;">
    <button class="btn" onclick="goToEnterTest()">
      ➕ Enter Test
    </button>
  </section>

 <!-- ===== QUICK STATS ===== -->
<section class="section">

  <div class="grid-2">

    <div class="card-mini">
      <h3>👥 Athletes</h3>
      <p id="totalAthletes">0</p>
    </div>

    <div class="card-mini">
      <h3>📊 Tests</h3>
      <p id="totalTests">0</p>
    </div>

  </div>

</section>

<!-- ===== DASHBOARD ===== -->
<section class="section">

  <div class="grid grid-auto">

    <a class="card" href="timer.html">
      <h2>⏱ Training Timer</h2>
      <p style="color: var(--muted); margin-top:8px;">
        4 Quadrant Weight Room Timer
      </p>
    </a>

    <a class="card" href="testing.html">
      <h2>📋 Combine Testing</h2>
      <p style="color: var(--muted); margin-top:8px;">
        Record and Analyze Results
      </p>
    </a>

    <a class="card" href="athletes.html">
      <h2>🧑 Athlete Profiles</h2>
      <p style="color: var(--muted); margin-top:8px;">
        View Performance Ratings
      </p>
    </a>

    <a class="card" href="leaderboard.html">
      <h2>🏆 Leaderboard</h2>
      <p style="color: var(--muted); margin-top:8px;">
        Athlete Rankings
      </p>
    </a>

  </div>

</section>

  </section>

</main>

</body>
</html>
