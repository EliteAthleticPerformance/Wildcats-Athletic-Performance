<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Elite Athletic Performance</title>

<!-- 🔥 FIXED PATH -->
<link rel="stylesheet" href="./styles.css">

</head>

<body>

<!-- ===== HEADER ===== -->
<div id="header-placeholder"></div>

<!-- 🔥 FIXED PATHS -->
<script src="./js/themeLoader.js"></script>
<script src="./js/header.js"></script>

<!-- ===== MAIN ===== -->
<main>

  <!-- HERO -->
  <section class="section" style="text-align:center;">

    <h1>Track. Compete. Improve.</h1>
    <p style="opacity:0.8;">Elite Athlete Performance Tracking System</p>

    <div style="margin-top:20px;">
      <button class="primary-btn" onclick="goToPage('enter.html')">
        ➕ Enter Test
      </button>
    </div>

  </section>

  <!-- QUICK STATS -->
  <section class="section" style="text-align:center;">

    <div class="stats-row">

      <div class="stat-item">
        <div class="stat-icon">👥</div>
        <div id="athleteCount" class="stat-value">--</div>
        <div class="stat-label">Athletes</div>
      </div>

      <div class="stat-item">
        <div class="stat-icon">📊</div>
        <div id="testCount" class="stat-value">--</div>
        <div class="stat-label">Tests</div>
      </div>

    </div>

  </section>

  <!-- NAV CARDS -->
  <section class="section">

    <div class="card-grid">

      <div class="card" onclick="goToPage('timer.html')">
        <div class="card-icon">⏱</div>
        <h2>Training Timer</h2>
        <p>4 Quadrant Weight Room Timer</p>
      </div>

      <div class="card" onclick="goToPage('testing.html')">
        <div class="card-icon">📋</div>
        <h2>Combine Testing</h2>
        <p>Record and Analyze Results</p>
      </div>

      <div class="card" onclick="goToPage('athletes.html')">
        <div class="card-icon">👤</div>
        <h2>Athlete Profiles</h2>
        <p>View Performance Ratings</p>
      </div>

      <!-- 🔥 UPDATED: ALWAYS PASSES SCHOOL -->
      <div class="card" onclick="goToPage('leaderboard.html')">
        <div class="card-icon">🏆</div>
        <h2>Leaderboard</h2>
        <p>Athlete Rankings</p>
      </div>

    </div>

  </section>

</main>

<!-- ===== NAVIGATION ===== -->
<script>
function goToPage(page) {
  const school =
    new URLSearchParams(window.location.search).get("school") ||
    sessionStorage.getItem("school") ||
    "pleasanthill";

  sessionStorage.setItem("school", school);

  window.location.href = page + "?school=" + school;
}
</script>

<!-- ===== DATA ===== -->
<script src="./js/dataLoader.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  try {
    await window.APP_READY;

    const data = await loadAthleteData();

    if (!data || !data.length) return;

    const athletes = new Set(data.map(d => d.name)).size;

    document.getElementById("athleteCount").textContent = athletes;
    document.getElementById("testCount").textContent = data.length;

  } catch (err) {
    console.error("❌ Dashboard load error:", err);
  }
});
</script>

</body>
</html>
