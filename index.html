<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link id="dynamicFavicon" rel="icon" type="image/png">

<title>Elite Athletic Performance System</title>

<link rel="stylesheet" href="/Elite-Athletic-Performance/styles.css">

</head>

<body>

<!-- HEADER -->
<div id="header-placeholder"></div>

<!-- 🔥 CORRECT LOAD ORDER -->
<script src="/Elite-Athletic-Performance/js/themeLoader.js"></script>
<script src="/Elite-Athletic-Performance/js/header.js"></script>

<!-- MAIN -->
<main>

  <!-- HERO -->
  <section class="section" style="text-align:center;">
    <h1 class="hero-title">Track. Compete. Improve.</h1>
    <p style="color: var(--muted); margin-top:10px;">
      Elite Athlete Performance Tracking System
    </p>
  </section>

  <!-- PRIMARY ACTION -->
  <section class="section" style="text-align:center;">
    <a id="enterBtn" class="btn">➕ Enter Test</a>
  </section>

  <!-- QUICK STATS -->
  <section class="section">
    <div class="grid-2">

      <div class="card-mini">
        <div class="card-icon">👥</div>
        <h3>Athletes</h3>
        <p id="totalAthletes">--</p>
      </div>

      <div class="card-mini">
        <div class="card-icon">📊</div>
        <h3>Tests</h3>
        <p id="totalTests">--</p>
      </div>

    </div>
  </section>

  <!-- DASHBOARD -->
  <section class="section">
    <div class="grid grid-auto">

      <a class="card" id="timerLink">
        <div class="card-icon">⏱️</div>
        <h2>Training Timer</h2>
        <p>4 Quadrant Weight Room Timer</p>
      </a>

      <a class="card" id="testingLink">
        <div class="card-icon">📋</div>
        <h2>Combine Testing</h2>
        <p>Record and Analyze Results</p>
      </a>

      <a class="card" id="athletesLink">
        <div class="card-icon">🧑</div>
        <h2>Athlete Profiles</h2>
        <p>View Performance Ratings</p>
      </a>

      <a class="card" id="leaderboardLink">
        <div class="card-icon">🏆</div>
        <h2>Leaderboard</h2>
        <p>Athlete Rankings</p>
      </a>

    </div>
  </section>

</main>

<!-- DATA -->
<script src="/Elite-Athletic-Performance/js/dataLoader.js"></script>

<!-- 🔗 LINK HANDLING (KEEP SCHOOL PARAM) -->
<script>
(async function () {
  await window.APP_READY;

  const school = sessionStorage.getItem("school");

  const base = window.location.pathname.includes("/Elite-Athletic-Performance/")
    ? "/Elite-Athletic-Performance/"
    : "/";

  function build(path) {
    return school ? `${base}${path}?school=${school}` : `${base}${path}`;
  }

  document.getElementById("enterBtn").href = build("enter.html");

  document.getElementById("timerLink").href = build("timer.html");
  document.getElementById("testingLink").href = build("testing.html");
  document.getElementById("athletesLink").href = build("athletes.html");
  document.getElementById("leaderboardLink").href = build("leaderboard.html");
})();
</script>

<!-- 📊 LIVE STATS (FIXED) -->
<script>
(async function () {
  try {
    await window.APP_READY;

    const data = await loadAthleteData();

    document.getElementById("totalTests").textContent =
      Array.isArray(data) ? data.length : 0;

    const unique = new Set(
      (data || [])
        .map(d => d.name)
        .filter(n => n && n.trim() !== "")
    );

    document.getElementById("totalAthletes").textContent = unique.size;

  } catch (err) {
    console.warn("Stats load failed:", err);

    document.getElementById("totalTests").textContent = "0";
    document.getElementById("totalAthletes").textContent = "0";
  }
})();
</script>

</body>
</html>
